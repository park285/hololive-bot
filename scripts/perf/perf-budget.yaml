schemaVersion: 1
repo: hololive-bot
defaults:
  critical:
    max_ns_regression_percent: 10
    max_bytes_regression_percent: 10
    allow_alloc_increase: false
  hotpath:
    max_ns_regression_percent: 15
    max_bytes_regression_percent: 15
    allow_alloc_increase: false
  build_path:
    max_ns_regression_percent: 20
    max_bytes_regression_percent: 20
    allow_alloc_increase: warn
  non_critical:
    max_ns_regression_percent: 25
    max_bytes_regression_percent: 25
    allow_alloc_increase: warn
benchmarks:
  BenchmarkGetTemplateCacheHit: { package: ./hololive/hololive-shared/pkg/service/template, class: critical, gate: pr, harness_files: [hololive/hololive-shared/pkg/service/template/renderer_bench_test.go] }
  BenchmarkRenderCachedTemplate: { package: ./hololive/hololive-shared/pkg/service/template, class: hotpath, gate: pr, harness_files: [hololive/hololive-shared/pkg/service/template/renderer_bench_test.go] }
  BenchmarkStoreTemplateAtFullCache: { package: ./hololive/hololive-shared/pkg/service/template, class: hotpath, gate: nightly, harness_files: [hololive/hololive-shared/pkg/service/template/renderer_bench_test.go] }
  BenchmarkBuildDedupeKey: { package: ./hololive/hololive-shared/pkg/service/alarm/dispatchoutbox, class: hotpath, gate: pr, harness_files: [hololive/hololive-shared/pkg/service/alarm/dispatchoutbox/dedupe_key_bench_test.go] }
  BenchmarkBuildEventKey: { package: ./hololive/hololive-shared/pkg/service/alarm/dispatchoutbox, class: hotpath, gate: pr, harness_files: [hololive/hololive-shared/pkg/service/alarm/dispatchoutbox/dedupe_key_bench_test.go] }
  BenchmarkFindBestMatchCacheHit: { package: ./hololive/hololive-api/internal/planes/bot/internal/service/matcher, class: critical, gate: pr, harness_files: [hololive/hololive-api/internal/planes/bot/internal/service/matcher/matcher_bench_test.go] }
  BenchmarkDeliveryBatchUpdateArgs: { package: ./hololive/hololive-shared/pkg/service/youtube/outbox/internal/delivery/store, class: build_path, gate: pr, harness_files: [hololive/hololive-shared/pkg/service/youtube/outbox/internal/delivery/store/delivery_batch_update_args_bench_test.go] }
  BenchmarkHTTP1: { package: ./hololive/hololive-shared/pkg/server/internal/httpserver, class: non_critical, gate: nightly, harness_files: [hololive/hololive-shared/pkg/server/internal/httpserver/h2c_test.go] }
  BenchmarkH2C: { package: ./hololive/hololive-shared/pkg/server/internal/httpserver, class: non_critical, gate: nightly, harness_files: [hololive/hololive-shared/pkg/server/internal/httpserver/h2c_test.go] }
  BenchmarkH2CConcurrent: { package: ./hololive/hololive-shared/pkg/server/internal/httpserver, class: non_critical, gate: nightly, harness_files: [hololive/hololive-shared/pkg/server/internal/httpserver/h2c_test.go] }
  BenchmarkHTTP1Concurrent: { package: ./hololive/hololive-shared/pkg/server/internal/httpserver, class: non_critical, gate: nightly, harness_files: [hololive/hololive-shared/pkg/server/internal/httpserver/h2c_test.go] }
  BenchmarkGetLiveStatus: { package: ./hololive/hololive-shared/pkg/service/chzzk, class: non_critical, gate: nightly, harness_files: [hololive/hololive-shared/pkg/service/chzzk/client_test.go] }
settings:
  mode: warn
  benchstat_alpha: 0.05
  min_count: 6
  noise_floor_ns: 50
