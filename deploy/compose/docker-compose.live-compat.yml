# Explicit opt-in overlay for the current live host bindings.
# LIVE_LOGS_PATH: /opt 배포 시 ../../logs가 root 소유 current/logs에 갇히는 문제를 피하기 위한
# 호스트 로그 절대경로. 개인 경로 하드코딩 대신 필수 변수로 강제한다.

x-live-postgres-env: &live-postgres-env
  POSTGRES_HOST: holo-postgres
  POSTGRES_PORT: "5432"
  POSTGRES_SSLMODE: ${POSTGRES_SSLMODE:-verify-full}
  # 라이브 호스트의 runtime-config 마운트 특성상 파일 stat 검사를 건너뛰는 호환 플래그.
  IRIS_BASE_URL_FILE_SKIP_STAT_CHECKS: ${IRIS_BASE_URL_FILE_SKIP_STAT_CHECKS:-true}

services:
  holo-postgres:
    environment:
      PGPORT: "5432"
    ports:
      - "${POSTGRES_PORT_BIND_IP:-100.100.1.3}:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB -p 5432 && psql -U $$POSTGRES_USER -d $$POSTGRES_DB -p 5432 -c 'SELECT 1' -q -t"]

  valkey-cache:
    ports:
      - "${VALKEY_PORT_BIND_IP:-100.100.1.3}:6379:6379"
    # 777은 이 오버레이 한정 완화: 앱(uid 1000)이 valkey 그룹에 없어 770이면 소켓 접속이 막힌다.
    # base prod는 770 유지 — repo_security_contract_test가 prod의 777을 금지 패턴으로 강제한다.
    command:
      - /bin/sh
      - -c
      - exec valkey-server --unixsocket /var/run/valkey/valkey-cache.sock --unixsocketperm 777 --port 6379 --requirepass "$$CACHE_PASSWORD" --appendonly no --save "" --maxmemory 384mb --maxmemory-policy allkeys-lfu --loglevel notice --io-threads 4 --io-threads-do-reads yes --activedefrag yes --active-defrag-threshold-lower 10 --active-defrag-cycle-min 1 --active-defrag-cycle-max 25

  hololive-db-migrate:
    environment:
      PGHOST: holo-postgres
      PGPORT: "5432"

  hololive-api:
    env_file: !override
      - ${HOLOLIVE_API_ENV_FILE:-/run/hololive-bot/bot.env}
    environment:
      <<: *live-postgres-env
      IRIS_BASE_URL_FILE: ${IRIS_BASE_URL_FILE:-/app/runtime-config/iris_base_url}
      IRIS_BASE_URL_ALLOWED_HOSTS: ${IRIS_BASE_URL_ALLOWED_HOSTS:-100.100.1.5}
      HEALTHCHECK_SERVER_NAME: ${HOLOLIVE_H3_SERVER_NAME:-100.100.1.3}
    ports: !override
      - "${HOLOLIVE_API_PORT_BIND_IP:-100.100.1.3}:30001:30001"
      - "${HOLOLIVE_API_PORT_BIND_IP:-100.100.1.3}:30001:30001/udp"
      - "127.0.0.1:30003:30003"
      - "127.0.0.1:30003:30003/udp"
      - "127.0.0.1:30006:30006"
      - "127.0.0.1:30006:30006/udp"
      - "127.0.0.1:30091:30091"
      - "127.0.0.1:30061:30061"
    volumes: !override
      - ../../data:/app/data
      - ${LIVE_LOGS_PATH:?LIVE_LOGS_PATH is required for live-compat overlays}:/app/logs
      - ../../runtime-config:/app/runtime-config:ro
      - /run/hololive-bot/certs/hololive-h3.crt:/run/hololive-bot/certs/hololive-h3.crt:ro
      - /run/hololive-bot/certs/hololive-h3.key:/run/hololive-bot/certs/hololive-h3.key:ro
      - /run/hololive-bot/certs/iris-ca.pem:/run/hololive-bot/certs/iris-ca.pem:ro
      - /run/hololive-bot/certs/postgres-ca.pem:/run/hololive-bot/certs/postgres-ca.pem:ro
      - valkey-cache-socket:/var/run/valkey:ro

  hololive-alarm-worker:
    env_file: !override
      - ${HOLOLIVE_ALARM_WORKER_ENV_FILE:-/run/hololive-bot/alarm-worker.env}
    environment:
      <<: *live-postgres-env
      IRIS_BASE_URL_FILE: ${IRIS_BASE_URL_FILE:-/app/runtime-config/iris_base_url}
      IRIS_BASE_URL_ALLOWED_HOSTS: ${IRIS_BASE_URL_ALLOWED_HOSTS:-100.100.1.5}
    volumes: !override
      - ../../data:/app/data
      - ${LIVE_LOGS_PATH:?LIVE_LOGS_PATH is required for live-compat overlays}:/app/logs
      - ../../runtime-config:/app/runtime-config:ro
      - /run/hololive-bot/certs/hololive-h3.crt:/run/hololive-bot/certs/hololive-h3.crt:ro
      - /run/hololive-bot/certs/hololive-h3.key:/run/hololive-bot/certs/hololive-h3.key:ro
      - /run/hololive-bot/certs/iris-ca.pem:/run/hololive-bot/certs/iris-ca.pem:ro
      - /run/hololive-bot/certs/postgres-ca.pem:/run/hololive-bot/certs/postgres-ca.pem:ro
      - valkey-cache-socket:/var/run/valkey:ro

  youtube-producer:
    environment:
      <<: *live-postgres-env
    volumes: !override
      - ../../data:/app/data
      - ${LIVE_LOGS_PATH:?LIVE_LOGS_PATH is required for live-compat overlays}:/app/logs
      - ../../runtime-config:/app/runtime-config:ro
      - /run/hololive-bot/certs/hololive-h3.crt:/run/hololive-bot/certs/hololive-h3.crt:ro
      - /run/hololive-bot/certs/hololive-h3.key:/run/hololive-bot/certs/hololive-h3.key:ro
      - /run/hololive-bot/certs/postgres-ca.pem:/run/hololive-bot/certs/postgres-ca.pem:ro
      - valkey-cache-socket:/var/run/valkey:ro

  admin-dashboard:
    environment:
      ALLOWED_ORIGINS: ${ADMIN_DASHBOARD_ALLOWED_ORIGINS:-https://admin.holo-oshi.com,https://admin.capu.blog}
    ports:
      - "${ADMIN_DASHBOARD_PORT_BIND_IP:-127.0.0.1}:30190:30190"
    volumes:
      - ${LIVE_LOGS_PATH:?LIVE_LOGS_PATH is required for live-compat overlays}:/app/logs
