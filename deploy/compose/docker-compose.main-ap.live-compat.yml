# main-ap 확장 인스턴스의 사전 hardening 운영 동작을 보존하는 명시 opt-in overlay입니다.

services:
  hololive-bot:
    environment:
      IRIS_BASE_URL_ALLOWED_HOSTS: ${IRIS_BASE_URL_ALLOWED_HOSTS:-100.100.1.5}

  hololive-alarm-worker:
    environment:
      IRIS_BASE_URL_ALLOWED_HOSTS: ${IRIS_BASE_URL_ALLOWED_HOSTS:-100.100.1.5}

  youtube-producer-c:
    environment:
      POSTGRES_HOST: host.docker.internal
      POSTGRES_PORT: "5433"
      POSTGRES_SSLMODE: ${POSTGRES_SSLMODE:-require}
      POSTGRES_SSLMODE_ALLOW_INSECURE: ${POSTGRES_SSLMODE_ALLOW_INSECURE:-true}
    volumes: !override
      - ../../data:/app/data
      - ../../logs:/app/logs
      - ../../runtime-config:/app/runtime-config:ro
      - /run/hololive-bot/certs:/run/hololive-bot/certs:ro
      - valkey-cache-socket:/var/run/valkey:ro
