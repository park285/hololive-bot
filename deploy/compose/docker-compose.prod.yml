name: hololive-bot

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "5m"
    max-file: "3"

x-restart-logging: &restart-logging
  restart: always
  logging: *default-logging

x-autoheal-service: &autoheal-service
  <<: *restart-logging
  labels:
    deunhealth.restart.on.unhealthy: "true"

x-app-file-log-env: &app-file-log-env
  LOG_LEVEL: ${LOG_LEVEL:-info}
  LOG_MAX_SIZE_MB: ${LOG_MAX_SIZE_MB:-5}
  LOG_MAX_BACKUPS: ${LOG_MAX_BACKUPS:-5}
  LOG_MAX_AGE_DAYS: ${LOG_MAX_AGE_DAYS:-30}
  LOG_COMPRESS: ${LOG_COMPRESS:-true}

x-security-hardening: &security-hardening
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  read_only: true
  tmpfs:
    - /tmp:size=64m,mode=1777

x-app-service: &app-service
  <<: [*autoheal-service, *security-hardening]
  # 의도된 차등: 앱은 수동 정지를 존중(unless-stopped), DB/인프라는 x-restart-logging의 always를 유지한다.
  restart: unless-stopped

x-public-dns: &public-dns
  - 8.8.8.8
  - 1.1.1.1

x-host-extra-hosts: &host-extra-hosts
  - "host.docker.internal:host-gateway"

x-iris-extra-hosts: &iris-extra-hosts
  - "host.docker.internal:host-gateway"
  - "vnic-kapu-iris-seoul-fk:100.100.1.5"
  - "vnic-kapu-iris-seoul-fk.tail742dd8.ts.net:100.100.1.5"

x-db-security: &db-security
  # postgres entrypoint의 root->postgres 강하는 setuid 비트가 아닌 CAP_SETUID 기반이라 NNP와 공존 가능.
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  cap_add:
    - SETUID
    - SETGID
    - CHOWN
    - FOWNER
    - DAC_OVERRIDE
  read_only: true
  tmpfs:
    - /tmp:size=64m,mode=1777

x-db-service: &db-service
  <<: [*autoheal-service, *db-security]

x-go-build-base: &go-build-base
  context: ../..
  provenance: mode=max
  sbom: true
  additional_contexts:
    shared_go_workspace: ${SHARED_GO_WORKSPACE_PATH:-../../../shared-go}
    iris_client_go_workspace: ${IRIS_CLIENT_GO_WORKSPACE_PATH:-../../../iris-client-go}

x-go-healthcheck: &go-healthcheck
  interval: 30s
  timeout: 5s
  start_period: 30s
  retries: 3

x-deploy-512m: &deploy-512m
  resources:
    limits:
      memory: 512m
      pids: 256
x-deploy-384m: &deploy-384m
  resources:
    limits:
      memory: 384m
      pids: 256
x-deploy-128m: &deploy-128m
  resources:
    limits:
      memory: 128m
      pids: 128
x-deploy-64m: &deploy-64m
  resources:
    limits:
      memory: 64m
      pids: 64
x-deploy-32m: &deploy-32m
  resources:
    limits:
      memory: 32m
      pids: 64

x-cache-env: &cache-env
  CACHE_SOCKET_PATH: ${CACHE_SOCKET_PATH:-}
  CACHE_HOST: valkey-cache
  CACHE_PORT: 6379
  CACHE_PASSWORD: ${CACHE_PASSWORD:?CACHE_PASSWORD is required}

x-postgres-env: &postgres-env
  POSTGRES_HOST: holo-postgres
  POSTGRES_PORT: "5432"
  POSTGRES_SOCKET_PATH: ""
  POSTGRES_DB: hololive
  POSTGRES_USER: ${HOLOLIVE_DB_USER:-hololive_runtime}
  # 런타임 유저 전용 키(HOLOLIVE_DB_PASSWORD)가 있으면 우선, 없으면 기존 DB_PASSWORD 폴백(하위호환).
  POSTGRES_PASSWORD: ${HOLOLIVE_DB_PASSWORD:-${DB_PASSWORD}}
  POSTGRES_SSLMODE: ${POSTGRES_SSLMODE:-verify-full}
  POSTGRES_SSLROOTCERT: ${POSTGRES_SSLROOTCERT:-/run/hololive-bot/certs/postgres-ca.pem}
  POSTGRES_QUERY_EXEC_MODE: ${POSTGRES_QUERY_EXEC_MODE:-exec}
  POSTGRES_AUTO_PREPARE_SCHEMA: "false"

x-iris-env: &iris-env
  IRIS_BASE_URL: ${IRIS_BASE_URL:-}
  IRIS_BASE_URL_FILE: ${IRIS_BASE_URL_FILE:-}
  IRIS_TRANSPORT: ${IRIS_TRANSPORT:-h3}
  IRIS_H3_CA_CERT_FILE: ${IRIS_H3_CA_CERT_FILE:-/run/hololive-bot/certs/iris-ca.pem}
  IRIS_H3_SERVER_NAME: ${IRIS_H3_SERVER_NAME:-}
  IRIS_WEBHOOK_TOKEN: ${IRIS_WEBHOOK_TOKEN:-}
  IRIS_WEBHOOK_REQUIRE_HMAC: ${IRIS_WEBHOOK_REQUIRE_HMAC:-true}
  IRIS_BOT_TOKEN: ${IRIS_BOT_TOKEN:-}

x-hololive-h3-files-env: &hololive-h3-files-env
  HOLOLIVE_H3_CERT_FILE: ${HOLOLIVE_H3_CERT_FILE:-/run/hololive-bot/certs/hololive-h3.crt}
  HOLOLIVE_H3_KEY_FILE: ${HOLOLIVE_H3_KEY_FILE:-/run/hololive-bot/certs/hololive-h3.key}
  HOLOLIVE_INTERNAL_H3_CA_CERT_FILE: ${HOLOLIVE_INTERNAL_H3_CA_CERT_FILE:-/run/hololive-bot/certs/hololive-h3.crt}
  HOLOLIVE_INTERNAL_H3_SERVER_NAME: ${HOLOLIVE_INTERNAL_H3_SERVER_NAME:-127.0.0.1}
  HEALTHCHECK_CA_CERT_FILE: ${HOLOLIVE_H3_CERT_FILE:-/run/hololive-bot/certs/hololive-h3.crt}
  HEALTHCHECK_SERVER_NAME: ${HOLOLIVE_H3_SERVER_NAME:-127.0.0.1}

x-cliproxy-env: &cliproxy-env
  CLIPROXY_ENABLED: "true"
  CLIPROXY_BASE_URL: ${CLIPROXY_BASE_URL:-http://host.docker.internal:8787/v1}
  CLIPROXY_API_KEY: ${CLIPROXY_API_KEY:-}
  CLIPROXY_MODEL: ${CLIPROXY_MODEL:-gpt-5.4}
  CLIPROXY_REASONING_EFFORT: ${CLIPROXY_REASONING_EFFORT:-high}

x-scraper-env: &scraper-env
  SCRAPER_FETCHER_ENGINE: "${YOUTUBE_PRODUCER_FETCHER_ENGINE:-nethttp}"
  SCRAPER_SCHEDULER_WORKER_COUNT: "${SCRAPER_SCHEDULER_WORKER_COUNT:-0}"
  SCRAPER_WORKER_COUNT: "${SCRAPER_WORKER_COUNT:-4}"
  SCRAPER_POLL_VIDEOS_INTERVAL_SECONDS: "${SCRAPER_POLL_VIDEOS_INTERVAL_SECONDS:-0}"
  SCRAPER_VIDEOS_SECONDS: "${SCRAPER_VIDEOS_SECONDS:-900}"
  SCRAPER_POLL_SHORTS_INTERVAL_SECONDS: "${SCRAPER_POLL_SHORTS_INTERVAL_SECONDS:-0}"
  SCRAPER_SHORTS_SECONDS: "${SCRAPER_SHORTS_SECONDS:-120}"
  SCRAPER_POLL_COMMUNITY_INTERVAL_SECONDS: "${SCRAPER_POLL_COMMUNITY_INTERVAL_SECONDS:-0}"
  SCRAPER_COMMUNITY_SECONDS: "${SCRAPER_COMMUNITY_SECONDS:-120}"
  SCRAPER_POLL_STATS_INTERVAL_SECONDS: "${SCRAPER_POLL_STATS_INTERVAL_SECONDS:-0}"
  SCRAPER_STATS_SECONDS: "${SCRAPER_STATS_SECONDS:-21600}"
  SCRAPER_POLL_LIVE_INTERVAL_SECONDS: "${SCRAPER_POLL_LIVE_INTERVAL_SECONDS:-0}"
  SCRAPER_LIVE_SECONDS: "${SCRAPER_LIVE_SECONDS:-120}"
  SCRAPER_BACKFILL_ENABLED: "${SCRAPER_BACKFILL_ENABLED:-false}"
  SCRAPER_BACKFILL_SHORTS_ENABLED: "${SCRAPER_BACKFILL_SHORTS_ENABLED:-true}"
  SCRAPER_BACKFILL_SHORTS_INTERVAL_SECONDS: "${SCRAPER_BACKFILL_SHORTS_INTERVAL_SECONDS:-300}"
  SCRAPER_BACKFILL_COMMUNITY_ENABLED: "${SCRAPER_BACKFILL_COMMUNITY_ENABLED:-true}"
  SCRAPER_BACKFILL_COMMUNITY_INTERVAL_SECONDS: "${SCRAPER_BACKFILL_COMMUNITY_INTERVAL_SECONDS:-600}"
  SCRAPER_BACKFILL_LIVE_ENABLED: "${SCRAPER_BACKFILL_LIVE_ENABLED:-true}"
  SCRAPER_BACKFILL_LIVE_INTERVAL_SECONDS: "${SCRAPER_BACKFILL_LIVE_INTERVAL_SECONDS:-180}"
  SCRAPER_BACKFILL_TARGET_GROUP: "${SCRAPER_BACKFILL_TARGET_GROUP:-notification}"

x-go-volumes: &go-volumes
  - ../../data:/app/data
  - ../../logs:/app/logs
  - /run/hololive-bot/certs/hololive-h3.crt:/run/hololive-bot/certs/hololive-h3.crt:ro
  - /run/hololive-bot/certs/hololive-h3.key:/run/hololive-bot/certs/hololive-h3.key:ro
  - /run/hololive-bot/certs/postgres-ca.pem:/run/hololive-bot/certs/postgres-ca.pem:ro
  - valkey-cache-socket:/var/run/valkey:ro

x-hololive-api-volumes: &hololive-api-volumes
  - ../../data:/app/data
  - ../../logs:/app/logs
  - ../../runtime-config:/app/runtime-config:ro
  - /run/hololive-bot/certs/hololive-h3.crt:/run/hololive-bot/certs/hololive-h3.crt:ro
  - /run/hololive-bot/certs/hololive-h3.key:/run/hololive-bot/certs/hololive-h3.key:ro
  - /run/hololive-bot/certs/iris-ca.pem:/run/hololive-bot/certs/iris-ca.pem:ro
  - /run/hololive-bot/certs/postgres-ca.pem:/run/hololive-bot/certs/postgres-ca.pem:ro
  - valkey-cache-socket:/var/run/valkey:ro

x-alarm-worker-volumes: &alarm-worker-volumes
  - ../../data:/app/data
  - ../../logs:/app/logs
  - ../../runtime-config:/app/runtime-config:ro
  - /run/hololive-bot/certs/hololive-h3.crt:/run/hololive-bot/certs/hololive-h3.crt:ro
  - /run/hololive-bot/certs/hololive-h3.key:/run/hololive-bot/certs/hololive-h3.key:ro
  - /run/hololive-bot/certs/iris-ca.pem:/run/hololive-bot/certs/iris-ca.pem:ro
  - /run/hololive-bot/certs/postgres-ca.pem:/run/hololive-bot/certs/postgres-ca.pem:ro
  - valkey-cache-socket:/var/run/valkey:ro

x-db-depends: &db-depends
  holo-postgres:
    condition: service_healthy
  hololive-db-migrate:
    condition: service_completed_successfully

x-db-cache-depends: &db-cache-depends
  <<: *db-depends
  valkey-cache:
    condition: service_healthy

services:
  holo-postgres:
    <<: *db-service
    # postgres 18.4의 2026-06-26 빌드 digest(실행 중이던 구빌드 7aba8c66 대체). 이후 갱신은 Renovate PR로만 올린다.
    image: ${POSTGRES_IMAGE:-postgres:18@sha256:4aabea78cf39b90e834caf3af7d602a18565f6fe2508705c8d01aa63245c2e20}
    container_name: holo-postgres
    oom_score_adj: -300
    shm_size: 256mb
    command:
      - postgres
      - "-c"
      - "shared_preload_libraries=pg_stat_statements"
      - "-c"
      - "pg_stat_statements.track=all"
      - "-c"
      - "pg_stat_statements.track_utility=off"
      - "-c"
      - "pg_stat_statements.max=5000"
      - "-c"
      - "compute_query_id=on"
      - "-c"
      - "track_io_timing=on"
      - "-c"
      - "track_wal_io_timing=on"
      - "-c"
      - "shared_buffers=128MB"
      - "-c"
      - "effective_cache_size=256MB"
      - "-c"
      - "maintenance_work_mem=64MB"
      - "-c"
      - "work_mem=4MB"
      - "-c"
      - "max_connections=60"
      - "-c"
      - "io_method=worker"
      - "-c"
      - "io_workers=3"
      - "-c"
      - "effective_io_concurrency=16"
      - "-c"
      - "maintenance_io_concurrency=16"
      - "-c"
      - "ssl=on"
      - "-c"
      - "ssl_cert_file=/run/hololive-bot/postgres-tls/server.crt"
      - "-c"
      - "ssl_key_file=/run/hololive-bot/postgres-tls/server.key"
    environment:
      POSTGRES_DB: hololive
      POSTGRES_USER: ${POSTGRES_ADMIN_USER:-postgres_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_ADMIN_USER: ${POSTGRES_ADMIN_USER:-postgres_admin}
      POSTGRES_ADMIN_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      # 역할별 전용 비밀번호(비우면 init-db가 DB_PASSWORD로 폴백) — admin 열쇠와 분리 권장.
      HOLOLIVE_DB_USER: ${HOLOLIVE_DB_USER:-hololive_runtime}
      HOLOLIVE_DB_PASSWORD: ${HOLOLIVE_DB_PASSWORD:-}
      HOLOLIVE_MIGRATOR_USER: ${HOLOLIVE_MIGRATOR_USER:-hololive_migrator}
      HOLOLIVE_MIGRATOR_PASSWORD: ${HOLOLIVE_MIGRATOR_PASSWORD:-}
      HOLOLIVE_SCRAPER_USER: ${HOLOLIVE_SCRAPER_USER:-hololive_scraper}
      HOLOLIVE_SCRAPER_PASSWORD: ${HOLOLIVE_SCRAPER_PASSWORD:-}
      # PG18 parent mount를 사용하되 기존 named volume의 pgdata 상대 경로는 유지한다.
      PGDATA: /var/lib/postgresql/pgdata
      PGPORT: "5432"
    volumes:
      - holo-pg-data:/var/lib/postgresql
      - ../../backups:/backups
      - ../../hololive/hololive-api/scripts/init-db:/docker-entrypoint-initdb.d:ro
      - /run/hololive-bot/postgres-tls:/run/hololive-bot/postgres-tls:ro
    tmpfs:
      - /tmp:size=64m,mode=1777
      - /var/run/postgresql:size=16m,mode=3775
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB -p 5432 && psql -U $$POSTGRES_USER -d $$POSTGRES_DB -p 5432 -c 'SELECT 1' -q -t"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    # shm_size 256mb는 tmpfs라 컨테이너 메모리 cgroup에 합산된다:
    # shared_buffers 128MB + shm 최대 256MB + work_mem/maintenance 여유분 → 512m은 OOM-kill 산수.
    # 상한을 1g로 상향(대안: shm_size 128mb 축소). valkey는 기존 *deploy-512m 유지.
    deploy:
      resources:
        limits:
          memory: 1g
          pids: 256
    networks:
      - hololive-net

  valkey-cache:
    <<: *db-service
    image: ${VALKEY_IMAGE:-valkey/valkey:9.1.0-alpine3.23@sha256:a35428eba9043cc0b79dbe54100f0c92784f2de00ad09b01182bfb1c5c83d1bd}
    container_name: valkey-cache
    oom_score_adj: -300
    environment:
      CACHE_PASSWORD: ${CACHE_PASSWORD:?CACHE_PASSWORD is required}
    ports:
      - "127.0.0.1:6379:6379"
    # appendonly no + save "" 순수 캐시 구성이라 /data 영속 볼륨은 실사용이 없어 제거했다.
    volumes:
      - valkey-cache-socket:/var/run/valkey
    # unixsocketperm 777: 앱(uid 1000)과 valkey 유저의 그룹이 달라 770이면 소켓 접근이 막힌다.
    # 소켓 볼륨은 신뢰된 앱 컨테이너에만 ro 마운트되고 requirepass가 인증 경계다.
    command:
      - /bin/sh
      - -c
      - exec valkey-server --unixsocket /var/run/valkey/valkey-cache.sock --unixsocketperm 777 --port 6379 --requirepass "$$CACHE_PASSWORD" --appendonly no --save "" --maxmemory 384mb --maxmemory-policy allkeys-lfu --loglevel notice --io-threads 4 --io-threads-do-reads yes --activedefrag yes --active-defrag-threshold-lower 10 --active-defrag-cycle-min 1 --active-defrag-cycle-max 25
    sysctls:
      - net.core.somaxconn=1024
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=\"$$CACHE_PASSWORD\" valkey-cli -s /var/run/valkey/valkey-cache.sock ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy: *deploy-512m
    networks:
      - hololive-net

  hololive-db-migrate:
    <<: *security-hardening
    image: hololive-api:prod
    build:
      <<: *go-build-base
      dockerfile: hololive/hololive-api/Dockerfile
      args:
        VERSION: ${HOLO_API_VERSION:-2.0.0}
    container_name: hololive-db-migrate
    restart: "no"
    environment:
      PGHOST: holo-postgres
      PGPORT: "5432"
      PGDATABASE: hololive
      PGUSER: ${HOLOLIVE_MIGRATOR_USER:-hololive_migrator}
      PGPASSWORD: ${HOLOLIVE_MIGRATOR_PASSWORD:-${DB_PASSWORD}}
      PGSSLMODE: ${PGSSLMODE:-verify-full}
      PGSSLROOTCERT: /run/hololive-bot/certs/postgres-ca.pem
      POSTGRES_ADMIN_USER: ${POSTGRES_ADMIN_USER:-postgres_admin}
      POSTGRES_ADMIN_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      HOLOLIVE_SCRAPER_USER: ${HOLOLIVE_SCRAPER_USER:-hololive_scraper}
      HOLOLIVE_SCRAPER_PASSWORD: ${HOLOLIVE_SCRAPER_PASSWORD:-}
      MIGRATION_BASELINE_THROUGH: ${MIGRATION_BASELINE_THROUGH:-}
    entrypoint:
      - /app/bin/db-migrate
    volumes:
      - ../../hololive/hololive-api/scripts/migrations:/migrations:ro
      - /run/hololive-bot/certs/postgres-ca.pem:/run/hololive-bot/certs/postgres-ca.pem:ro
    depends_on:
      holo-postgres:
        condition: service_healthy
    logging: *default-logging
    # 마이그레이션 도중 OOM-kill을 피하려 memory 상한은 두지 않고 pids만 제한(fork 방어).
    deploy:
      resources:
        limits:
          pids: 256
    networks:
      - hololive-net

  hololive-alarm-worker:
    <<: *app-service
    image: hololive-alarm-worker:prod
    build:
      <<: *go-build-base
      dockerfile: hololive/hololive-alarm-worker/Dockerfile
      args:
        VERSION: ${HOLO_ALARM_WORKER_VERSION:-${HOLO_API_VERSION:-2.0.0}}
    container_name: hololive-alarm-worker
    # 배치 디스패치/전송 도중 SIGKILL을 피하기 위한 우아한 종료 여유(api와 동일 기준).
    stop_grace_period: 45s
    env_file:
      - ${HOLOLIVE_ALARM_WORKER_ENV_FILE:-/run/hololive-bot/alarm-worker.env}
    environment:
      <<: [*app-file-log-env, *iris-env, *hololive-h3-files-env, *cache-env, *postgres-env]
      NOTIFICATION_EGRESS_ROLE: "owner"
      NOTIFICATION_SCHEDULER_ROLE: "worker"
      YOUTUBE_OUTBOX_DISPATCHER_ENABLED: ${YOUTUBE_OUTBOX_DISPATCHER_ENABLED:-true}
      YOUTUBE_OUTBOX_KARING_ENABLED: ${YOUTUBE_OUTBOX_KARING_ENABLED:-false}
      DELIVERY_DISPATCHER_ENABLED: ${DELIVERY_DISPATCHER_ENABLED:-true}
      ALARM_DISPATCH_CONSUMER_ENABLED: ${ALARM_DISPATCH_CONSUMER_ENABLED:-true}
      ALARM_WORKER_EGRESS_LEASE_ENABLED: ${ALARM_WORKER_EGRESS_LEASE_ENABLED:-true}
      SERVER_PORT: 30007
      HOLOLIVE_HTTP_TRANSPORTS: ${HOLOLIVE_ALARM_WORKER_HTTP_TRANSPORTS:-h3}
      HOLOLIVE_H3_ADDR: ${HOLOLIVE_ALARM_WORKER_H3_ADDR:-:30007}
      HOLOLIVE_METRICS_ADDR: ${HOLOLIVE_ALARM_WORKER_METRICS_ADDR:-:30097}
      HOLOLIVE_PPROF_ADDR: ${HOLOLIVE_ALARM_WORKER_PPROF_ADDR:-:30067}
      POSTGRES_POOL_MIN_CONNS: ${ALARM_WORKER_POSTGRES_POOL_MIN_CONNS:-1}
      POSTGRES_POOL_MAX_CONNS: ${ALARM_WORKER_POSTGRES_POOL_MAX_CONNS:-8}
      ALARM_DISPATCH_KARING_ENABLED: ${ALARM_DISPATCH_KARING_ENABLED:-false}
      ALARM_DISPATCH_WAKEUP_ENABLED: ${ALARM_DISPATCH_WAKEUP_ENABLED:-true}
      ALARM_DISPATCH_MAX_DELIVERIES_PER_BATCH: ${ALARM_DISPATCH_MAX_DELIVERIES_PER_BATCH:-1000}
      ALARM_DISPATCH_MAX_BATCH: ${ALARM_DISPATCH_MAX_BATCH:-50}
      ALARM_DISPATCH_LEASE_SECONDS: ${ALARM_DISPATCH_LEASE_SECONDS:-60}
      ALARM_DISPATCH_QUARANTINE_THRESHOLD_SECONDS: ${ALARM_DISPATCH_QUARANTINE_THRESHOLD_SECONDS:-}
      ALARM_DISPATCH_POLL_INTERVAL_MS: ${ALARM_DISPATCH_POLL_INTERVAL_MS:-1000}
      ALARM_DISPATCH_MAX_BATCHES_PER_WAKE: ${ALARM_DISPATCH_MAX_BATCHES_PER_WAKE:-20}
      ALARM_DISPATCH_IDLE_BACKOFF_MIN_MS: ${ALARM_DISPATCH_IDLE_BACKOFF_MIN_MS:-250}
      ALARM_DISPATCH_IDLE_BACKOFF_MAX_MS: ${ALARM_DISPATCH_IDLE_BACKOFF_MAX_MS:-5000}
      ALARM_DISPATCH_RECOVERY_INTERVAL_MS: ${ALARM_DISPATCH_RECOVERY_INTERVAL_MS:-30000}
      ALARM_DISPATCH_RECOVERY_BATCH_SIZE: ${ALARM_DISPATCH_RECOVERY_BATCH_SIZE:-100}
      ALARM_DISPATCH_RETENTION_ENABLED: ${ALARM_DISPATCH_RETENTION_ENABLED:-true}
      ALARM_DISPATCH_RETENTION_INTERVAL_MS: ${ALARM_DISPATCH_RETENTION_INTERVAL_MS:-3600000}
      ALARM_DISPATCH_RETENTION_QUERY_TIMEOUT_MS: ${ALARM_DISPATCH_RETENTION_QUERY_TIMEOUT_MS:-30000}
      ALARM_DISPATCH_RETENTION_LIMIT: ${ALARM_DISPATCH_RETENTION_LIMIT:-1000}
      ALARM_DISPATCH_RETENTION_SENT_DAYS: ${ALARM_DISPATCH_RETENTION_SENT_DAYS:-90}
      ALARM_DISPATCH_RETENTION_DLQ_DAYS: ${ALARM_DISPATCH_RETENTION_DLQ_DAYS:-180}
      ALARM_DISPATCH_RETENTION_QUARANTINED_DAYS: ${ALARM_DISPATCH_RETENTION_QUARANTINED_DAYS:-180}
      ALARM_DISPATCH_RETENTION_CANCELLED_DAYS: ${ALARM_DISPATCH_RETENTION_CANCELLED_DAYS:-90}
      ALARM_DISPATCH_RETENTION_EVENT_DAYS: ${ALARM_DISPATCH_RETENTION_EVENT_DAYS:-90}
      ALARM_TWITCH_ENABLED: ${ALARM_TWITCH_ENABLED:-true}
      LOG_DIR: /app/logs
      GOMEMLIMIT: "320MiB"
      APP_ENV: "production"
      KAKAO_ROOMS: ${KAKAO_ROOMS:-}
      KAKAO_ACL_ENABLED: ${KAKAO_ACL_ENABLED:-true}
      KAKAO_ACL_MODE: ${KAKAO_ACL_MODE:-whitelist}
      HOLODEX_API_KEY: ${HOLODEX_API_KEY:-}
      HOLODEX_API_KEY_1: ${HOLODEX_API_KEY_1:-}
    ports:
      - "127.0.0.1:30007:30007"
      - "127.0.0.1:30007:30007/udp"
      - "127.0.0.1:30097:30097"
      - "127.0.0.1:30067:30067"
    volumes: *alarm-worker-volumes
    extra_hosts: *iris-extra-hosts
    depends_on: *db-cache-depends
    deploy: *deploy-384m
    healthcheck:
      <<: *go-healthcheck
      test: ["CMD", "./bin/healthcheck", "https://127.0.0.1:30007/health"]
    networks:
      hololive-net:
        aliases:
          - hololive-alarm-worker

  hololive-api:
    <<: *app-service
    image: hololive-api:prod
    build:
      <<: *go-build-base
      dockerfile: hololive/hololive-api/Dockerfile
      args:
        VERSION: ${HOLO_API_VERSION:-2.0.0}
    container_name: hololive-api
    stop_grace_period: 45s
    env_file:
      - ${HOLOLIVE_API_ENV_FILE:-/run/hololive-bot/bot.env}
    environment:
      <<: [*app-file-log-env, *iris-env, *hololive-h3-files-env, *cache-env, *postgres-env, *cliproxy-env]
      APP_VERSION: ${HOLO_API_VERSION:-2.0.0}
      APP_ENV: "production"
      SERVER_PORT: 30001
      HOLOLIVE_HTTP_TRANSPORTS: ${HOLOLIVE_HTTP_TRANSPORTS:-h3}
      HOLOLIVE_H3_ADDR: ${HOLOLIVE_H3_ADDR:-:30001}
      HOLOLIVE_METRICS_ADDR: ${HOLOLIVE_API_METRICS_ADDR:-:30091}
      HOLOLIVE_PPROF_ADDR: ${HOLOLIVE_API_PPROF_ADDR:-:30061}
      HOLOLIVE_ADMIN_API_PORT: 30006
      HOLOLIVE_ADMIN_API_HTTP_TRANSPORTS: ${HOLOLIVE_ADMIN_API_HTTP_TRANSPORTS:-h3}
      HOLOLIVE_ADMIN_API_H3_ADDR: ${HOLOLIVE_ADMIN_API_H3_ADDR:-:30006}
      LLM_SCHEDULER_PORT: 30003
      HOLOLIVE_LLM_SCHEDULER_HTTP_TRANSPORTS: ${HOLOLIVE_LLM_SCHEDULER_HTTP_TRANSPORTS:-h3}
      HOLOLIVE_LLM_SCHEDULER_H3_ADDR: ${HOLOLIVE_LLM_SCHEDULER_H3_ADDR:-:30003}
      LLM_SCHEDULER_INTERNAL_URL: https://127.0.0.1:30003
      SERVICES_LLM_SCHEDULER_HEALTH_URL: https://127.0.0.1:30003/health
      ALARM_INTERNAL_URL: https://hololive-alarm-worker:30007
      BOT_POSTGRES_POOL_MIN_CONNS: ${BOT_POSTGRES_POOL_MIN_CONNS:-1}
      BOT_POSTGRES_POOL_MAX_CONNS: ${BOT_POSTGRES_POOL_MAX_CONNS:-4}
      ADMIN_API_POSTGRES_POOL_MIN_CONNS: ${ADMIN_API_POSTGRES_POOL_MIN_CONNS:-1}
      ADMIN_API_POSTGRES_POOL_MAX_CONNS: ${ADMIN_API_POSTGRES_POOL_MAX_CONNS:-4}
      LLM_SCHEDULER_POSTGRES_POOL_MIN_CONNS: ${LLM_SCHEDULER_POSTGRES_POOL_MIN_CONNS:-1}
      LLM_SCHEDULER_POSTGRES_POOL_MAX_CONNS: ${LLM_SCHEDULER_POSTGRES_POOL_MAX_CONNS:-4}
      ADMIN_ALLOWED_IPS: ${ADMIN_ALLOWED_IPS:-172.16.0.0/12,127.0.0.1/32}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://admin.holo-oshi.com,https://admin.capu.blog}
      CORS_ENFORCE: ${CORS_ENFORCE:-true}
      KAKAO_ROOMS: ${KAKAO_ROOMS:-}
      KAKAO_ACL_ENABLED: ${KAKAO_ACL_ENABLED:-true}
      KAKAO_ACL_MODE: ${KAKAO_ACL_MODE:-whitelist}
      HOLODEX_API_KEY: ${HOLODEX_API_KEY:-}
      HOLODEX_API_KEY_1: ${HOLODEX_API_KEY_1:-}
      SERVICES_GAME_BOT_TWENTYQ_HEALTH_URL: http://host.docker.internal:30081/health
      SERVICES_GAME_BOT_TURTLE_HEALTH_URL: http://host.docker.internal:30082/health
      NOTIFICATION_EGRESS_ROLE: "producer"
      NOTIFICATION_SCHEDULER_ROLE: "off"
      DELIVERY_DISPATCHER_ENABLED: "false"
      YOUTUBE_OUTBOX_DISPATCHER_ENABLED: "false"
      ALARM_DISPATCH_CONSUMER_ENABLED: "false"
      ALARM_WORKER_EGRESS_LEASE_ENABLED: "false"
      LOG_DIR: /app/logs
      GOGC: "80"
      GOMEMLIMIT: "1024MiB"
      GIN_MODE: release
    dns: *public-dns
    ports:
      - "127.0.0.1:30001:30001"
      - "127.0.0.1:30001:30001/udp"
      - "127.0.0.1:30003:30003"
      - "127.0.0.1:30003:30003/udp"
      - "127.0.0.1:30006:30006"
      - "127.0.0.1:30006:30006/udp"
      - "127.0.0.1:30091:30091"
      - "127.0.0.1:30061:30061"
    volumes: *hololive-api-volumes
    extra_hosts: *iris-extra-hosts
    depends_on:
      <<: *db-cache-depends
      hololive-alarm-worker:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1280m
          pids: 512
    healthcheck:
      <<: *go-healthcheck
      start_period: 45s
      test:
        - CMD
        - ./bin/healthcheck
        - --api-key-env
        - API_SECRET_KEY
        - https://127.0.0.1:30001/health
        - https://127.0.0.1:30003/internal/ready
        - https://127.0.0.1:30006/health
    networks:
      hololive-net:
        aliases:
          - hololive-api

  youtube-producer:
    <<: *app-service
    profiles: ["oracle"]
    image: hololive-youtube-producer:prod
    build:
      <<: *go-build-base
      dockerfile: hololive/hololive-youtube-producer/Dockerfile
      args:
        VERSION: ${HOLO_API_VERSION:-2.0.0}
    container_name: hololive-youtube-producer
    environment:
      <<: [*app-file-log-env, *hololive-h3-files-env, *cache-env, *postgres-env, *scraper-env, *cliproxy-env]
      NOTIFICATION_EGRESS_ROLE: "producer"
      YOUTUBE_OUTBOX_DISPATCHER_ENABLED: "false"
      YOUTUBE_PRODUCER_RUNTIME_ALLOWED: "false"
      SERVER_PORT: 30005
      HOLOLIVE_HTTP_TRANSPORTS: ${HOLOLIVE_YOUTUBE_PRODUCER_HTTP_TRANSPORTS:-h3}
      HOLOLIVE_H3_ADDR: ${HOLOLIVE_YOUTUBE_PRODUCER_H3_ADDR:-:30005}
      HOLOLIVE_METRICS_ADDR: ${HOLOLIVE_YOUTUBE_PRODUCER_METRICS_ADDR:-:30095}
      POSTGRES_POOL_MIN_CONNS: ${YOUTUBE_PRODUCER_POSTGRES_POOL_MIN_CONNS:-2}
      POSTGRES_POOL_MAX_CONNS: ${YOUTUBE_PRODUCER_POSTGRES_POOL_MAX_CONNS:-8}
      API_SECRET_KEY: ${API_SECRET_KEY:-}
      HOLODEX_API_KEY: ${HOLODEX_API_KEY:-}
      HOLODEX_API_KEY_1: ${HOLODEX_API_KEY_1:-}
      YOUTUBE_INGESTION_ENABLED: "true"
      YOUTUBE_PRODUCER_REQUEST_INTERVAL_SECONDS: "${YOUTUBE_PRODUCER_REQUEST_INTERVAL_SECONDS:-2}"
      PHOTO_SYNC_ENABLED: "true"
      GOGC: "100"
      GOMEMLIMIT: "320MiB"
      GIN_MODE: release
      LOG_DIR: /app/logs
    dns: *public-dns
    ports:
      - "127.0.0.1:30005:30005"
      - "127.0.0.1:30005:30005/udp"
      - "127.0.0.1:30095:30095"
    volumes: *go-volumes
    extra_hosts: *host-extra-hosts
    depends_on: *db-cache-depends
    deploy: *deploy-384m
    healthcheck:
      <<: *go-healthcheck
      test: ["CMD", "./bin/healthcheck", "https://127.0.0.1:30005/health"]
    networks:
      hololive-net:
        aliases:
          - youtube-producer

  admin-dashboard:
    <<: *app-service
    image: admin-dashboard:prod
    build:
      <<: *go-build-base
      dockerfile: admin-dashboard/Dockerfile
      args:
        VERSION: ${HOLO_API_VERSION:-2.0.0}
    container_name: admin-dashboard
    # admin의 내부 graceful shutdown 예산(20s, app.go ShutdownTimeout)이 Docker 기본 10s에 잘리지 않도록 45s로 상향.
    stop_grace_period: 45s
    # 시크릿(ADMIN_PASS_HASH/SESSION_SECRET/VALKEY_URL/HOLO_BOT_API_KEY)은 다른 앱과 동일하게
    # /run 하위 env_file로 이동 — 호스트 .env와 `compose config` 렌더 결과에서 시크릿을 제거한다.
    # (docker inspect의 Config.Env 노출까지 없애려면 앱의 *_FILE 로딩 지원이 필요 — 후속 과제)
    # required:false — admin-dashboard는 central 전용인데 AP 배포도 전체 모델을 `config`로 검증하므로
    # AP 호스트의 파일 부재를 허용해야 한다. central 실재는 systemd-compose-up wait_for_file이 보장한다.
    env_file:
      - path: ${ADMIN_DASHBOARD_ENV_FILE:-/run/hololive-bot/admin-dashboard.env}
        required: false
    environment:
      PORT: "30190"
      ENV: "production"
      FORCE_HTTPS: "true"
      TRUST_FORWARDED_HEADERS: "true"
      # hololive-net gateway 단일 신뢰: host 게시(127.0.0.1:30190) 트래픽만 docker-proxy를 거쳐
      # 이 IP로 도달한다. 대역 전체(/12)를 신뢰하면 동거 컨테이너가 XFF로 client IP를 위조해
      # 로그인 rate limit을 우회할 수 있다. 네트워크 재생성으로 게이트웨이가 바뀌면 XFF 무시로
      # 안전하게 격하된다(단일 버킷 rate limit).
      TRUSTED_PROXY_CIDRS: "172.23.0.1/32"
      LOG_LEVEL: "info"
      ALLOWED_ORIGINS: "https://admin.holo-oshi.com,https://admin.capu.blog"
      ADMIN_USER: ${ADMIN_USER:-admin}
      SESSION_TOKEN_ROTATION: "true"
      DOCKER_HOST: tcp://docker-proxy:2375
      HOLO_ADMIN_API_URL: https://hololive-api:30006
      HOLO_BOT_URL: https://hololive-api:30006
      HOLOLIVE_INTERNAL_H3_CA_CERT_FILE: ${HOLOLIVE_INTERNAL_H3_CA_CERT_FILE:-/run/hololive-bot/certs/hololive-h3.crt}
      HOLOLIVE_INTERNAL_H3_SERVER_NAME: ${HOLOLIVE_INTERNAL_H3_SERVER_NAME:-127.0.0.1}
      LOG_DIR: /app/logs
    ports:
      - "127.0.0.1:30190:30190"
    volumes:
      - ../../logs:/app/logs
      - /run/hololive-bot/certs/hololive-h3.crt:/run/hololive-bot/certs/hololive-h3.crt:ro
    extra_hosts: *host-extra-hosts
    depends_on:
      valkey-cache:
        condition: service_healthy
      hololive-api:
        condition: service_healthy
      docker-proxy:
        condition: service_started
    deploy: *deploy-128m
    healthcheck:
      <<: *go-healthcheck
      # 코드 확인: FORCE_HTTPS는 쿠키 Secure/HSTS만 제어하고 리다이렉트하지 않으므로 HTTP /health 직검사가 안전하다.
      test: ["CMD", "./bin/healthcheck", "http://127.0.0.1:30190/health"]
    networks:
      hololive-net:
        aliases:
          - admin-dashboard
      docker-proxy-net: {}

  docker-proxy:
    <<: *restart-logging
    image: ${DOCKER_SOCKET_PROXY_IMAGE:-wollomatic/socket-proxy:1.12.2@sha256:ad9df81849436b5ddae36396e2aefd6562d4cd587d1b65fcb5ac71e4578c9da3}
    container_name: docker-proxy
    command:
      - '-loglevel=info'
      - '-listenip=0.0.0.0'
      - '-proxyport=2375'
      # allowfrom 전체 허용: 접근 통제는 internal 네트워크(docker-proxy-net) 멤버십이 담당한다.
      # 고정 서브넷+allowfrom 축소는 호스트의 기존 브리지 풀과 충돌 위험이 있어 적용하지 않는다.
      - '-allowfrom=0.0.0.0/0'
      - '-allowGET=(/v1\.[0-9]+)?/(_ping|version|events(\?.*)?|containers/json(\?.*)?|containers/[^/]+/json(\?.*)?)'
      - '-allowHEAD=(/v1\.[0-9]+)?/_ping'
      # 컨테이너 "이름 접두사" 스코핑을 하지 않는 이유: deunhealth는 이벤트의 컨테이너 ID로 restart를
      # 호출하고, 허용된 GET containers/json이 이미 전체 ID를 노출하므로 이름 제한은 실효가 없다.
      - '-allowPOST=(/v1\.[0-9]+)?/containers/[^/]+/(start|stop|restart)(\?.*)?'
    group_add:
      - "${DOCKER_SOCKET_GID:-107}"
    read_only: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy: *deploy-64m
    networks:
      - docker-proxy-net

  deunhealth:
    <<: [*restart-logging, *security-hardening]
    image: ${DEUNHEALTH_IMAGE:-qmcgaw/deunhealth@sha256:db1e4fcd3aceeb0da34a83f7a8a5432df586e6d0388ddb6ad8dd7b479e4aa25d}
    container_name: deunhealth
    environment:
      TZ: Asia/Seoul
      LOG_LEVEL: info
      DOCKER_HOST: tcp://docker-proxy:2375
    depends_on:
      docker-proxy:
        condition: service_started
    deploy: *deploy-32m
    networks:
      - docker-proxy-net

volumes:
  holo-pg-data:
  valkey-cache-socket:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=1m,mode=0777

networks:
  hololive-net:
    driver: bridge
  docker-proxy-net:
    driver: bridge
    internal: true
