x-osaka-ap-env: &osaka-ap-env
  CACHE_SOCKET_PATH: ""
  CACHE_HOST: ${OSAKA_CACHE_HOST:-100.100.1.3}
  CACHE_PORT: ${OSAKA_CACHE_PORT:-6379}
  POSTGRES_SOCKET_PATH: ""
  POSTGRES_HOST: ${OSAKA_POSTGRES_HOST:-100.100.1.3}
  POSTGRES_PORT: ${OSAKA_POSTGRES_PORT:-5433}
  CLIPROXY_BASE_URL: ${OSAKA_CLIPROXY_BASE_URL:-http://100.100.1.3:8787/v1}
  SCRAPER_BACKFILL_ENABLED: "${SCRAPER_BACKFILL_ENABLED:-false}"
  SCRAPER_BACKFILL_SHORTS_ENABLED: "${SCRAPER_BACKFILL_SHORTS_ENABLED:-true}"
  SCRAPER_BACKFILL_SHORTS_INTERVAL_SECONDS: "${SCRAPER_BACKFILL_SHORTS_INTERVAL_SECONDS:-300}"
  SCRAPER_BACKFILL_COMMUNITY_ENABLED: "${SCRAPER_BACKFILL_COMMUNITY_ENABLED:-true}"
  SCRAPER_BACKFILL_COMMUNITY_INTERVAL_SECONDS: "${SCRAPER_BACKFILL_COMMUNITY_INTERVAL_SECONDS:-600}"
  SCRAPER_BACKFILL_LIVE_ENABLED: "${SCRAPER_BACKFILL_LIVE_ENABLED:-true}"
  SCRAPER_BACKFILL_LIVE_INTERVAL_SECONDS: "${SCRAPER_BACKFILL_LIVE_INTERVAL_SECONDS:-180}"
  SCRAPER_BACKFILL_TARGET_GROUP: "${SCRAPER_BACKFILL_TARGET_GROUP:-notification}"

x-osaka-ap-logging: &osaka-ap-logging
  driver: "json-file"
  options:
    max-size: "5m"
    max-file: "3"

# AP 공통 서비스 골격. 인스턴스별 차이(container_name·INSTANCE_ID·SERVER_PORT·PHOTO_SYNC·ports)만 각 서비스에서 덮어쓴다.
# youtube-producer-b 는 Seoul 호스트(docker-compose.seoul.yml)로 이전됨.
x-osaka-ap-service: &osaka-ap-service
  extends:
    file: docker-compose.prod.yml
    service: youtube-producer
  profiles: ["oracle"]
  env_file:
    - ${HOLOLIVE_YOUTUBE_PRODUCER_ENV_FILE:-/run/hololive-bot/youtube-producer.env}
  volumes: !override
    - ../../data:/app/data
    - ../../logs:/app/logs
    - ../../runtime-config:/app/runtime-config:ro
    - /run/hololive-bot/certs/iris-ca.pem:/run/hololive-bot/certs/iris-ca.pem:ro
    - /run/hololive-bot/certs/postgres-ca.pem:/run/hololive-bot/certs/postgres-ca.pem:ro
    - /run/hololive-bot/certs/hololive-h3.crt:/run/hololive-bot/certs/hololive-h3.crt:ro
    - /run/hololive-bot/certs/hololive-h3.key:/run/hololive-bot/certs/hololive-h3.key:ro
  logging: *osaka-ap-logging
  deploy:
    resources:
      limits:
        memory: 768m

# AP 공통 env. GOMEMLIMIT: 768m 컨테이너에 맞춰 베이스 320MiB → 640MiB 상향(GC 빈도↓). GOGC 는 베이스(100) 유지.
x-osaka-ap-env-common: &osaka-ap-env-common
  <<: *osaka-ap-env
  YOUTUBE_PRODUCER_RUNTIME_ALLOWED: "true"
  YOUTUBE_PRODUCER_ACTIVE_ACTIVE_ENABLED: "true"
  YOUTUBE_PRODUCER_LEASE_NAMESPACE: ${YOUTUBE_PRODUCER_LEASE_NAMESPACE:-production}
  SCRAPER_FETCHER_ENGINE: ${YOUTUBE_PRODUCER_A_FETCHER_ENGINE:-nethttp}
  SCRAPER_SCHEDULER_WORKER_COUNT: ${YOUTUBE_PRODUCER_AP_WORKER_COUNT:-2}
  GOMEMLIMIT: "640MiB"

services:
  hololive-bot:
    env_file: !override []

  hololive-alarm-worker:
    env_file: !override []

  youtube-producer:
    profiles: !override ["retired-youtube-producer"]
    env_file: !override
      - ${HOLOLIVE_YOUTUBE_PRODUCER_ENV_FILE:-/run/hololive-bot/youtube-producer.env}
    environment:
      <<: *osaka-ap-env
      YOUTUBE_PRODUCER_RUNTIME_ALLOWED: "true"
    volumes: !override
      - ../../data:/app/data
      - ../../logs:/app/logs
      - ../../runtime-config:/app/runtime-config:ro
      - /run/hololive-bot/certs/iris-ca.pem:/run/hololive-bot/certs/iris-ca.pem:ro
      - /run/hololive-bot/certs/postgres-ca.pem:/run/hololive-bot/certs/postgres-ca.pem:ro
    logging: *osaka-ap-logging
    deploy:
      resources:
        limits:
          memory: 768m

  youtube-producer-a:
    <<: *osaka-ap-service
    container_name: hololive-youtube-producer-a
    environment:
      <<: *osaka-ap-env-common
      YOUTUBE_PRODUCER_INSTANCE_ID: "youtube-producer-a"
      SERVER_PORT: 30005
      PHOTO_SYNC_ENABLED: "true"
    ports: !override
      - "127.0.0.1:30005:30005"
      - "127.0.0.1:30005:30005/udp"
      - "100.100.1.7:30095:30095"
