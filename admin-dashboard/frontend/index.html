<!doctype html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0ea5e9" />
  <meta name="description" content="통합 봇 관리 시스템" />

  <!-- Preconnect for faster font loading -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Outfit (display) + Plus Jakarta Sans (body) -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>Bot Admin Console</title>

  <!-- 첫 페인트 전에 .dark를 세팅해야 FOUC가 없다. 번들은 module(defer)이라 늦는다. src/lib/theme.ts와 동일 로직. -->
  <script>
    (function () {
      var pref = "system";
      try {
        var stored = localStorage.getItem("theme");
        if (stored === "light" || stored === "dark" || stored === "system") pref = stored;
      } catch (e) { }
      var dark = pref === "dark" || (pref === "system" && window.matchMedia("(prefers-color-scheme: dark)").matches);
      document.documentElement.classList.toggle("dark", dark);
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
