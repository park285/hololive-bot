apiVersion: apps/v1
kind: Deployment
metadata:
  name: valkey-cache
  namespace: hololive
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: valkey-cache
  template:
    metadata:
      labels:
        app: valkey-cache
    spec:
      containers:
        - name: valkey-cache
          image: valkey/valkey:9.0.2-alpine3.23
          imagePullPolicy: IfNotPresent
          args:
            - valkey-server
            - --port
            - "6379"
            - --appendonly
            - "no"
            - --save
            - ""
            - --maxmemory
            - "384mb"
            - --maxmemory-policy
            - allkeys-lfu
            - --loglevel
            - notice
            - --io-threads
            - "4"
            - --io-threads-do-reads
            - "yes"
            - --activedefrag
            - "yes"
            - --active-defrag-threshold-lower
            - "10"
            - --active-defrag-cycle-min
            - "1"
            - --active-defrag-cycle-max
            - "25"
          ports:
            - containerPort: 6379
              name: valkey
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - valkey-cli -h 127.0.0.1 -p 6379 ping | grep -q PONG
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - valkey-cli -h 127.0.0.1 -p 6379 ping | grep -q PONG
            initialDelaySeconds: 5
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - SETUID
                - SETGID
                - CHOWN
                - FOWNER
                - DAC_OVERRIDE
      restartPolicy: Always
