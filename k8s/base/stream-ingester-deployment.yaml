apiVersion: apps/v1
kind: Deployment
metadata:
  name: stream-ingester
  namespace: hololive
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: stream-ingester
  template:
    metadata:
      labels:
        app: stream-ingester
    spec:
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 1000
      initContainers:
        - name: wait-for-deps
          image: busybox:1.37
          command: ['sh', '-c', 'until nc -z valkey-cache 6379; do echo "valkey 대기 중..."; sleep 2; done']
      containers:
        - name: stream-ingester
          image: hololive-stream-ingester:prod
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 30004
              name: http
          envFrom:
            - configMapRef:
                name: hololive-app-config
            - secretRef:
                name: hololive-app-secret
          env:
            - name: SERVER_PORT
              value: "30004"
            - name: BOT_INGESTION_ENABLED
              value: "true"
            - name: ALARM_DISPATCHER_URL
              value: "http://hololive-bot:30001"
            - name: POSTGRES_SSLMODE
              value: "disable"
            - name: GOGC
              value: "100"
            - name: GOMEMLIMIT
              value: "320MiB"
            - name: LOG_DIR
              value: ""
          volumeMounts:
            - name: data
              mountPath: /app/data
          resources:
            requests:
              cpu: 200m
              memory: 192Mi
            limits:
              cpu: 600m
              memory: 384Mi
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 4
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: data
          hostPath:
            path: /srv/hololive/data
            type: DirectoryOrCreate
      restartPolicy: Always
