# 호스트에서 실행 중인 외부 의존성을 클러스터 DNS 이름으로 노출합니다.
# 실제 호스트 게이트웨이 IP 변경 시 이 파일의 EndpointSlice addresses만 수정하면 됩니다.
# 포트는 base/configmap-app.yaml의 *_BASE_URL, SERVICES_*_HEALTH_URL과 일치해야 합니다.
apiVersion: v1
kind: Service
metadata:
  name: iris
  namespace: hololive
spec:
  clusterIP: None
  ports:
    - name: http
      port: 3000
      targetPort: 3000
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: iris-external
  namespace: hololive
  labels:
    kubernetes.io/service-name: iris
    endpointslice.kubernetes.io/managed-by: hololive-k8s
addressType: IPv4
ports:
  - name: http
    port: 3000
    protocol: TCP
endpoints:
  - addresses:
      - 10.42.0.1
---
