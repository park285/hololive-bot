apiVersion: apps/v1
kind: Deployment
metadata:
  name: alarm-dispatcher
  namespace: hololive
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: alarm-dispatcher
  template:
    metadata:
      labels:
        app: alarm-dispatcher
    spec:
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 1000
      initContainers:
        - name: wait-for-deps
          image: busybox:1.37
          command: ['sh', '-c', 'until nc -z valkey-cache 6379; do echo "valkey 대기 중..."; sleep 2; done']
      containers:
        - name: alarm-dispatcher
          image: hololive-alarm-dispatcher:prod
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 30010
              name: http
          envFrom:
            - configMapRef:
                name: hololive-app-config
            - secretRef:
                name: hololive-app-secret
          env:
            - name: ALARM_DISPATCHER_PORT
              value: "30010"
            - name: GO_ALARM_QUEUE_CONSUMER_ENABLED
              value: "true"
            - name: GOGC
              value: "100"
            - name: GOMEMLIMIT
              value: "128MiB"
            - name: LOG_DIR
              value: "/srv/hololive/logs"
            - name: LOG_FILE
              value: "alarm-dispatcher.log"
          volumeMounts:
            - name: logs
              mountPath: /srv/hololive/logs
          resources:
            requests:
              cpu: 100m
              memory: 96Mi
            limits:
              cpu: 300m
              memory: 192Mi
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 4
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: logs
          hostPath:
            path: /srv/hololive/logs
            type: DirectoryOrCreate
      restartPolicy: Always
