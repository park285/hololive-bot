# Rust dispatcher: alarm:dispatch:queue 소비 → Iris h2c 발송
# cutover 전까지 비활성 — kustomization.yaml에서 주석 해제 시 활성화
# Go alarm-dispatcher와 동시 운영 금지 (큐 소비 경합)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rust-dispatcher
  namespace: hololive
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: rust-dispatcher
  template:
    metadata:
      labels:
        app: rust-dispatcher
    spec:
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 1000
      initContainers:
        - name: wait-for-deps
          image: busybox:1.37
          command: ['sh', '-c', 'until nc -z valkey-cache 6379; do echo "valkey 대기 중..."; sleep 2; done && until nc -z holo-postgres 5433; do echo "postgres 대기 중..."; sleep 2; done']
      containers:
        - name: rust-dispatcher
          image: hololive-dispatcher:prod
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 30020
              name: http
          env:
            - name: DISPATCHER__VALKEY__URL
              value: "redis://valkey-cache:6379"
            - name: DISPATCHER__VALKEY__POOL_SIZE
              value: "4"
            - name: DISPATCHER__DB__HOST
              value: "holo-postgres"
            - name: DISPATCHER__DB__PORT
              value: "5433"
            - name: DISPATCHER__DB__NAME
              value: "hololive"
            - name: DISPATCHER__DB__USER
              value: "hololive_runtime"
            - name: DISPATCHER__DB__PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hololive-app-secret
                  key: DB_PASSWORD
            - name: DISPATCHER__DB__SSLMODE
              value: "disable"
            - name: DISPATCHER__DB__MAX_CONNECTIONS
              value: "5"
            - name: DISPATCHER__IRIS__BASE_URL
              value: "http://host-external:3000"
            - name: DISPATCHER__IRIS__BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hololive-app-secret
                  key: IRIS_BOT_TOKEN
            - name: DISPATCHER__IRIS__TIMEOUT_SECS
              value: "10"
            - name: DISPATCHER__HEALTH__HOST
              value: "0.0.0.0"
            - name: DISPATCHER__HEALTH__PORT
              value: "30020"
            - name: DISPATCHER__DISPATCHER__QUEUE_KEY
              value: "alarm:dispatch:queue"
            - name: DISPATCHER__DISPATCHER__MAX_BATCH
              value: "50"
            - name: DISPATCHER__DISPATCHER__RECONNECT_BACKOFF_MS
              value: "1000"
            - name: DISPATCHER__LOGGING__LEVEL
              value: "info"
            - name: DISPATCHER__LOGGING__FILE_ENABLED
              value: "true"
            - name: DISPATCHER__LOGGING__DIR
              value: "/srv/hololive/logs"
            - name: DISPATCHER__LOGGING__FILE
              value: "rust-dispatcher.log"
            - name: DISPATCHER__LOGGING__COMBINED_FILE
              value: "rust-dispatcher-combined.log"
            - name: RUST_LOG
              value: "info,dispatcher_app=info,sqlx=warn"
            - name: TZ
              value: "Asia/Seoul"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 4
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: logs
              mountPath: /srv/hololive/logs
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: logs
          hostPath:
            path: /srv/hololive/logs
            type: DirectoryOrCreate
      restartPolicy: Always
