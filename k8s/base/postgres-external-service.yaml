# 호스트 PostgreSQL(10.42.0.1:5433)을 클러스터 내부 DNS로 노출하는 헤드리스 서비스
apiVersion: v1
kind: Service
metadata:
  name: holo-postgres
  namespace: hololive
spec:
  clusterIP: None
  ports:
    - name: postgres
      port: 5433
      targetPort: 5433
---
# 실제 호스트 IP를 가리키는 엔드포인트 (K3s cni0 게이트웨이)
apiVersion: v1
kind: Endpoints
metadata:
  name: holo-postgres
  namespace: hololive
subsets:
  - addresses:
      - ip: 10.42.0.1
    ports:
      - name: postgres
        port: 5433
