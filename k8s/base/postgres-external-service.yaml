# 호스트 PostgreSQL(10.42.0.1:5433)을 클러스터 내부 DNS로 노출하는 헤드리스 서비스
apiVersion: v1
kind: Service
metadata:
  name: holo-postgres
  namespace: hololive
spec:
  clusterIP: None
  ports:
    - name: postgres
      port: 5433
      targetPort: 5433
---
# 실제 호스트 IP를 가리키는 EndpointSlice (K3s cni0 게이트웨이)
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: holo-postgres-external
  namespace: hololive
  labels:
    kubernetes.io/service-name: holo-postgres
    endpointslice.kubernetes.io/managed-by: hololive-k8s
addressType: IPv4
ports:
  - name: postgres
    port: 5433
    protocol: TCP
endpoints:
  - addresses:
      - 10.42.0.1
