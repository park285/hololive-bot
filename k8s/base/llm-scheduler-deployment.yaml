apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-scheduler
  namespace: hololive
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: llm-scheduler
  template:
    metadata:
      labels:
        app: llm-scheduler
    spec:
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 1000
      initContainers:
        - name: wait-for-deps
          image: busybox:1.37
          command: ['sh', '-c', 'until nc -z valkey-cache 6379; do echo "valkey 대기 중..."; sleep 2; done']
      containers:
        - name: llm-scheduler
          image: hololive-llm-scheduler:prod
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 30003
              name: http
          envFrom:
            - configMapRef:
                name: hololive-app-config
            - secretRef:
                name: hololive-app-secret
          env:
            - name: LLM_SCHEDULER_PORT
              value: "30003"
            - name: GOGC
              value: "100"
            - name: GOMEMLIMIT
              value: "256MiB"
            - name: LOG_DIR
              value: ""
          volumeMounts:
            - name: data
              mountPath: /app/data
          resources:
            requests:
              cpu: 200m
              memory: 160Mi
            limits:
              cpu: 500m
              memory: 320Mi
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 4
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: data
          hostPath:
            path: /srv/hololive/data
            type: DirectoryOrCreate
      restartPolicy: Always
