apiVersion: apps/v1
kind: Deployment
metadata:
  name: hololive-bot
  namespace: hololive
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: hololive-bot
  template:
    metadata:
      labels:
        app: hololive-bot
    spec:
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 1000
      initContainers:
        - name: wait-for-deps
          image: busybox:1.37
          command: ['sh', '-c', 'until nc -z valkey-cache 6379; do echo "valkey 대기 중..."; sleep 2; done']
      containers:
        - name: hololive-bot
          image: hololive-kakao-bot-go:prod
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 30001
              name: http
          envFrom:
            - configMapRef:
                name: hololive-common-config
            - configMapRef:
                name: hololive-bot-config
            - secretRef:
                name: hololive-common-secret
            - secretRef:
                name: hololive-bot-secret
          env:
            - name: SERVER_PORT
              value: "30001"
            - name: GOGC
              value: "60"
            - name: GOMEMLIMIT
              value: "450MiB"
            - name: ALARM_DISPATCHER_URL
              value: "http://hololive-bot:30001"
            - name: LLM_SCHEDULER_INTERNAL_URL
              value: "http://llm-scheduler:30003"
            - name: BOT_INGESTION_ENABLED
              value: "false"
            - name: BOT_ADMIN_ENABLED
              value: "true"
            - name: WEBHOOK_REQUIRE_HTTP2
              value: "true"
            - name: LOG_DIR
              value: ""
            - name: OTEL_SERVICE_NAME
              value: "hololive-bot"
            - name: OTEL_ENVIRONMENT
              value: "staging"
          volumeMounts:
            - name: data
              mountPath: /app/data
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 800m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 4
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: data
          hostPath:
            path: /srv/hololive/data
            type: DirectoryOrCreate
      restartPolicy: Always
