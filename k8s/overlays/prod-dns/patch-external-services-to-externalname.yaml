# DNS 기반 외부 의존성 라우팅.
# - host 서비스(POSTGRES/IRIS): 10.42.0.1.nip.io
# - docker bridge 서비스(CLIPROXY): 172.17.0.1.nip.io
# - docker container 직접 연결(LLM/Game-bot): 172.18.x.nip.io
apiVersion: v1
kind: Service
metadata:
  name: holo-postgres
  namespace: hololive
spec:
  $patch: replace
  type: ExternalName
  externalName: 10.42.0.1.nip.io
  ports:
    - name: postgres
      port: 5433
      targetPort: 5433
---
apiVersion: v1
kind: Service
metadata:
  name: iris
  namespace: hololive
spec:
  $patch: replace
  type: ExternalName
  externalName: 10.42.0.1.nip.io
  ports:
    - name: http
      port: 3000
      targetPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: cliproxy
  namespace: hololive
spec:
  $patch: replace
  type: ExternalName
  externalName: 172.17.0.1.nip.io
  ports:
    - name: http
      port: 8787
      targetPort: 8787
---
apiVersion: v1
kind: Service
metadata:
  name: llm-server
  namespace: hololive
spec:
  $patch: replace
  type: ExternalName
  externalName: 172.18.0.11.nip.io
  ports:
    - name: http
      port: 40527
      targetPort: 40527
---
apiVersion: v1
kind: Service
metadata:
  name: game-bot-twentyq
  namespace: hololive
spec:
  $patch: replace
  type: ExternalName
  externalName: 172.18.0.10.nip.io
  ports:
    - name: http
      port: 30081
      targetPort: 30081
---
apiVersion: v1
kind: Service
metadata:
  name: game-bot-turtle
  namespace: hololive
spec:
  $patch: replace
  type: ExternalName
  externalName: 172.18.0.12.nip.io
  ports:
    - name: http
      port: 30082
      targetPort: 30082
