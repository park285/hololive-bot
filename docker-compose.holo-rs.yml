# Podman 전용 compose: hololive-scraper-rs + hololive-alarm
# 인프라(Postgres, Valkey)는 Docker에서 실행 중 → host.containers.internal 경유 접근
# YAML anchor/depends_on/profiles/deunhealth/deploy.resources 없음 (podman-compose 호환)
name: holo-rs

services:
  hololive-scraper:
    container_name: hololive-scraper-rs
    image: hololive-scraper-rs:prod
    restart: always
    network_mode: "slirp4netns:allow_host_loopback=true,port_handler=slirp4netns"
    extra_hosts:
      - "host.containers.internal:10.0.2.2"
    ports:
      - "127.0.0.1:30010:30010"
    volumes:
      - ./logs:/app/logs:rw
    environment:
      SCRAPER__DATABASE__HOST: host.containers.internal
      SCRAPER__DATABASE__PORT: "5433"
      SCRAPER__DATABASE__NAME: hololive
      SCRAPER__DATABASE__USER: "${HOLOLIVE_SCRAPER_USER:-hololive_scraper}"
      SCRAPER__DATABASE__PASSWORD: "${HOLOLIVE_SCRAPER_PASSWORD}"
      SCRAPER__DATABASE__SSLMODE: disable
      SCRAPER__DATABASE__MAX_CONNECTIONS: "5"
      SCRAPER__PROXY__SOCKS5_URL: "socks5://host.containers.internal:1080"
      SCRAPER__SCHEDULER__SCRAPE_HOUR_KST: "6"
      SCRAPER__HEALTH__PORT: "30010"
      SCRAPER__LOGGING__LEVEL: info
      SCRAPER__LOGGING__DIR: /app/logs
      SCRAPER__LOGGING__FILE: hololive-scraper.log
      SCRAPER__LOGGING__COMBINED_FILE: combined.log
      RUST_LOG: "info,scraper_service=info,sqlx=warn"
      TZ: Asia/Seoul
      OTEL_ENABLED: "false"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:30010/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777

  hololive-alarm:
    container_name: hololive-alarm
    image: hololive-alarm:prod
    restart: always
    network_mode: "slirp4netns:allow_host_loopback=true,port_handler=slirp4netns"
    extra_hosts:
      - "host.containers.internal:10.0.2.2"
    ports:
      - "127.0.0.1:30011:30011"
    volumes:
      - ./logs:/app/logs:rw
    environment:
      ALARM__VALKEY__URL: "redis://host.containers.internal:6379"
      ALARM__VALKEY__POOL_SIZE: "4"
      ALARM__HOLODEX__BASE_URL: "https://holodex.net/api/v2"
      ALARM__HOLODEX__TIMEOUT_SECS: "30"
      ALARM__HOLODEX__RATE_LIMIT_MS: "100"
      ALARM__HOLODEX__CIRCUIT_FAILURE_THRESHOLD: "5"
      ALARM__HOLODEX__CIRCUIT_RESET_SECS: "30"
      ALARM__HOLODEX__API_KEYS: "${ALARM_HOLODEX_API_KEYS:-[]}"
      ALARM__CHZZK__BASE_URL: "https://api.chzzk.naver.com"
      ALARM__CHZZK__TIMEOUT_SECS: "10"
      ALARM__CHZZK__CIRCUIT_FAILURE_THRESHOLD: "5"
      ALARM__CHZZK__CIRCUIT_RESET_SECS: "30"
      ALARM__TWITCH__BASE_URL: "https://api.twitch.tv/helix"
      ALARM__TWITCH__AUTH_URL: "https://id.twitch.tv/oauth2/token"
      ALARM__TWITCH__CLIENT_ID: "${TWITCH_CLIENT_ID:-}"
      ALARM__TWITCH__CLIENT_SECRET: "${TWITCH_CLIENT_SECRET:-}"
      ALARM__TWITCH__TIMEOUT_SECS: "10"
      ALARM__TWITCH__CIRCUIT_FAILURE_THRESHOLD: "5"
      ALARM__TWITCH__CIRCUIT_RESET_SECS: "60"
      # NOTE: alarm 서비스는 Valkey 큐에 위임 — iris 직접 호출 없음; validator 통과용
      ALARM__IRIS__BASE_URL: "http://host.containers.internal:30001"
      ALARM__IRIS__BOT_TOKEN: "${IRIS_TOKEN:-}"
      ALARM__IRIS__TIMEOUT_SECS: "10"
      ALARM__IRIS__CIRCUIT_FAILURE_THRESHOLD: "5"
      ALARM__IRIS__CIRCUIT_RESET_SECS: "30"
      ALARM__DATABASE__HOST: host.containers.internal
      ALARM__DATABASE__PORT: "5433"
      ALARM__DATABASE__NAME: hololive
      ALARM__DATABASE__USER: "${HOLOLIVE_ALARM_USER:-hololive_runtime}"
      ALARM__DATABASE__PASSWORD: "${HOLOLIVE_ALARM_PASSWORD}"
      ALARM__DATABASE__SSLMODE: disable
      ALARM__DATABASE__MAX_CONNECTIONS: "5"
      ALARM__HEALTH__PORT: "30011"
      ALARM__LOGGING__LEVEL: info
      ALARM__LOGGING__DIR: /app/logs
      ALARM__LOGGING__FILE: hololive-alarm.log
      ALARM__LOGGING__COMBINED_FILE: combined.log
      ALARM__ALARM__TWITCH_ENABLED: "${ALARM_TWITCH_ENABLED:-false}"
      ALARM__ALARM__CHZZK_POLL_SECS: "120"
      ALARM__ALARM__TWITCH_POLL_SECS: "120"
      ALARM__ALARM__YOUTUBE_CHECK_TIMEOUT_SECS: "45"
      ALARM__ALARM__CHZZK_CHECK_TIMEOUT_SECS: "30"
      ALARM__ALARM__TWITCH_CHECK_TIMEOUT_SECS: "30"
      OTEL_ENABLED: "false"
      RUST_LOG: "info,alarm_service=debug,sqlx=warn"
      TZ: Asia/Seoul
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:30011/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
