        - type=registry,ref=${REMOTE_CACHE_PREFIX:?set REMOTE_CACHE_PREFIX}/hololive-youtube-scraper-buildcache:buildcache
      cache_to:
        - type=registry,ref=${REMOTE_CACHE_PREFIX:?set REMOTE_CACHE_PREFIX}/hololive-youtube-scraper-buildcache:buildcache,mode=max,image-manifest=true,oci-mediatypes=true

