        - type=registry,ref=${REMOTE_CACHE_PREFIX:?set REMOTE_CACHE_PREFIX}/hololive-stream-ingester-buildcache:buildcache,mode=max,image-manifest=true,oci-mediatypes=true

  youtube-scraper:
