logoutput: stdout

# Listen on all interfaces inside the container; published only to host loopback by docker-compose.
internal: 0.0.0.0 port = 1080

# Force outbound connections to use the VPN interface (created by OpenVPN).
external: tun0

socksmethod: none
# user.notprivileged: nobody  # Disabled - container runs as root without privilege separation

client pass {
  from: 0.0.0.0/0 to: 0.0.0.0/0
  log: error
}

socks pass {
  from: 0.0.0.0/0 to: 0.0.0.0/0
  command: connect
  log: error
}
