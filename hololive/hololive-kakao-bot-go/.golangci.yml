version: "2"

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly
  relative-path-mode: gomod

linters:
  default: none
  enable:
    # correctness
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused

    # resources / context / concurrency
    - bodyclose
    - rowserrcheck
    - sqlclosecheck
    - containedctx
    - contextcheck
    - noctx
    - fatcontext
    - copyloopvar

    # modern Go / stdlib / simplification
    - canonicalheader
    - durationcheck
    - embeddedstructfieldcheck
    - exptostd
    - intrange
    - makezero
    - mirror
    - modernize
    - recvcheck
    - unconvert
    - unqueryvet
    - usestdlibvars

    # errors
    - errname
    - errorlint
    - nilerr
    - nilnesserr
    - nilnil
    - wrapcheck

    # style / docs / suppression hygiene
    - depguard
    - godot
    - misspell
    - nakedret
    - nlreturn
    - nolintlint
    - predeclared
    - revive
    - sloglint
    - whitespace
    - wsl_v5
    - wastedassign

    # maintainability
    - dupl
    - funlen
    - gocognit
    - goconst
    - gocritic
    - gocyclo
    - interfacebloat
    - maintidx
    - nestif
    - prealloc

    # tests
    - testifylint
    - thelper
    - tparallel
    - usetesting

    # security / text safety
    - bidichk
    - gosec

  settings:
    errcheck:
      check-type-assertions: false
      check-blank: false
      exclude-functions:
        - (*database/sql.Rows).Close
        - (*database/sql.DB).Close
        - (*github.com/kapu/hololive-kakao-bot-go/internal/bot.Bot).sendError
        - (*net/http.Response).Body.Close
        - (*os.File).Close

    govet:
      enable-all: true
      disable:
        - fieldalignment

    staticcheck:
      checks:
        - all
        - -ST1000
        - -ST1020
        - -ST1021
        - -ST1022

    gocyclo:
      min-complexity: 17

    gocognit:
      min-complexity: 31

    dupl:
      threshold: 200

    goconst:
      min-len: 3
      min-occurrences: 5

    misspell:
      locale: US

    nakedret:
      max-func-lines: 30

    prealloc:
      simple: true
      range-loops: true
      for-loops: false

    gocritic:
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style
      disabled-checks:
        - dupImport
        - ifElseChain
        - octalLiteral
        - whyNoLint
        - exitAfterDefer
        - paramTypeCombine
        - unnamedResult
        - filepathJoin
        - hugeParam
        - emptyStringTest

    funlen:
      lines: 90
      statements: 45
      ignore-comments: true

    revive:
      severity: error
      enable-default-rules: true
      directives:
        - name: specify-disable-reason
          severity: error
      rules:
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true
        - name: use-any
        - name: use-errors-new
        - name: use-fmt-print
        - name: time-date
        - name: time-equal
        - name: error-naming
        - name: error-return
        - name: unexported-naming
        - name: unnecessary-format
        - name: unnecessary-if
        - name: unsecure-url-scheme
        - name: use-waitgroup-go



    nolintlint:
      allow-unused: false
      require-explanation: true
      require-specific: true

    wsl_v5:
      default: all
      allow-first-in-block: false
      allow-whole-block: false
      branch-max-lines: 2
      case-max-lines: 0

    godot:
      scope: declarations
      capital: true
      period: true

    copyloopvar:
      check-alias: true

    fatcontext:
      check-struct-pointers: true

    embeddedstructfieldcheck:
      empty-line: true
      forbid-mutex: true

    nilnil:
      only-two: false
      detect-opposite: true

    nlreturn:
      block-size: 2

    predeclared:
      qualified-name: true

    wrapcheck:
      report-internal-errors: true
      extra-ignore-sigs:
        - google.golang.org/grpc/status.Error
        - google.golang.org/grpc/status.Errorf
      ignore-package-globs:
        - github.com/valkey-io/valkey-go
        - github.com/valkey-io/valkey-go/*
        - google.golang.org/grpc/status
        - google.golang.org/grpc/status/*

    usestdlibvars:
      http-method: true
      http-status-code: true
      time-date-month: true
      time-weekday: true
      time-month: true
      time-layout: true
      crypto-hash: true
      default-rpc-path: true
      sql-isolation-level: true
      tls-signature-scheme: true
      constant-kind: true

    interfacebloat:
      max: 5

    maintidx:
      under: 35

    nestif:
      min-complexity: 4

    testifylint:
      enable-all: true

    usetesting:
      os-temp-dir: true
      context-background: true
      context-todo: true

    depguard:
      rules:
        cross-service-boundary:
          deny:
            - pkg: "github.com/kapu/hololive-admin"
              desc: "kakao-bot -> admin 교차 의존 금지"
            - pkg: "github.com/kapu/hololive-llm-sched"
              desc: "kakao-bot -> llm-sched 교차 의존 금지"
            - pkg: "github.com/kapu/hololive-youtube-producer"
              desc: "kakao-bot -> youtube-producer 교차 의존 금지"

  exclusions:
    generated: strict
    warn-unused: true
    rules:
      - linters:
          - contextcheck
        text: 'Non-inherited new context'

      - linters:
          - gosec
        text: "G115:"

      - linters:
          - gosec
        text: "G117:"

      - linters:
          - gosec
        text: "G704:"

    paths:
      - '.*\.pb\.go$'
      - vendor
      - proto

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  uniq-by-line: true
  new: false

formatters:
  enable:
    - gci
    - gofumpt
    - goimports

  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(github.com/kapu/hololive-kakao-bot-go)
      custom-order: true
      no-inline-comments: true
      no-prefix-comments: true

    gofumpt:
      module-path: github.com/kapu/hololive-kakao-bot-go
      extra-rules: true

    goimports:
      local-prefixes:
        - github.com/kapu/hololive-kakao-bot-go

  exclusions:
    generated: strict
    warn-unused: true
    paths:
      - '.*\.pb\.go$'
      - vendor
      - proto
