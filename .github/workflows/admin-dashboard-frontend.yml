name: Admin Dashboard Frontend

on:
  pull_request:
    paths:
      - 'admin-dashboard/frontend/**'
      - 'admin-dashboard/backend/src/**'
      - 'admin-dashboard/backend/tests/export_openapi_smoke.rs'
      - 'admin-dashboard/backend/src/bin/export-openapi.rs'
      - 'admin-dashboard/backend/docs/swagger.json'
      - 'admin-dashboard/backend/Cargo.toml'
      - 'admin-dashboard/backend/Cargo.lock'
  push:
    branches:
      - main
    paths:
      - 'admin-dashboard/frontend/**'
      - 'admin-dashboard/backend/src/**'
      - 'admin-dashboard/backend/tests/export_openapi_smoke.rs'
      - 'admin-dashboard/backend/src/bin/export-openapi.rs'
      - 'admin-dashboard/backend/docs/swagger.json'
      - 'admin-dashboard/backend/Cargo.toml'
      - 'admin-dashboard/backend/Cargo.lock'
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  frontend-quality:
    runs-on: [self-hosted, linux, x64, hololive-ci]
    timeout-minutes: 20
    defaults:
      run:
        working-directory: admin-dashboard/frontend
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: admin-dashboard/frontend/package-lock.json
      - run: npm ci
      - run: npm run generate:api
      - run: git diff --exit-code -- ../backend/docs/swagger.json src/api/generated
      - run: npm test
      - run: npm run lint
      - run: npm run build
