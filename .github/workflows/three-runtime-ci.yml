name: Three Runtime Integration CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: three-runtime-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  go-test:
    name: Go test (${{ matrix.module }})
    runs-on: ubuntu-latest
    container: golang:1.26.4-bookworm
    strategy:
      fail-fast: false
      matrix:
        module:
          - hololive/hololive-shared
          - hololive/hololive-kakao-bot-go
          - hololive/hololive-admin-api
          - hololive/hololive-llm-sched
          - hololive/hololive-alarm-worker
          - hololive/hololive-youtube-producer
          - hololive/hololive-api
    steps:
      - name: Checkout pull request branch
        shell: bash
        run: |
          set -euo pipefail
          ref="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          git clone --depth 1 --branch "$ref" "https://github.com/${GITHUB_REPOSITORY}.git" .
      - name: Test module
        shell: bash
        env:
          GOWORK: "off"
        run: |
          set -euo pipefail
          cd "${{ matrix.module }}"
          go test ./...

  race:
    name: Race-sensitive packages
    runs-on: ubuntu-latest
    container: golang:1.26.4-bookworm
    steps:
      - name: Checkout pull request branch
        shell: bash
        run: |
          set -euo pipefail
          ref="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          git clone --depth 1 --branch "$ref" "https://github.com/${GITHUB_REPOSITORY}.git" .
      - name: Alarm client and lifecycle race tests
        shell: bash
        env:
          GOWORK: "off"
        run: |
          set -euo pipefail
          cd hololive/hololive-shared
          go test -race ./pkg/service/alarm/...
          go test -race ./pkg/applifecycle/...

  architecture:
    name: Architecture boundary gate
    runs-on: ubuntu-latest
    container: golang:1.26.4-bookworm
    steps:
      - name: Checkout repositories
        shell: bash
        run: |
          set -euo pipefail
          ref="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          git clone --depth 1 --branch "$ref" "https://github.com/${GITHUB_REPOSITORY}.git" .
          git clone --depth 1 --branch v1.19.0 https://github.com/park285/shared-go.git ../shared-go
          git clone --depth 1 --branch v0.22.0 https://github.com/park285/iris-client-go.git ../iris-client-go
      - name: Run architecture contracts
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/architecture/ci-boundary-gate.sh

  compose:
    name: Render production topology
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pull request branch
        shell: bash
        run: |
          set -euo pipefail
          ref="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          git clone --depth 1 --branch "$ref" "https://github.com/${GITHUB_REPOSITORY}.git" .
      - name: Render Compose
        shell: bash
        env:
          DB_PASSWORD: ci-db-password
          CACHE_PASSWORD: ci-cache-password
          ADMIN_PASS_BCRYPT: ci-bcrypt-placeholder
          SESSION_SECRET: ci-session-secret
          API_SECRET_KEY: ci-api-secret
          KAKAO_ROOMS: ci-room
          HOLODEX_API_KEY: ci-holodex-key
        run: |
          set -euo pipefail
          docker compose -f deploy/compose/docker-compose.runtime3.yml config --quiet

  image:
    name: Build hololive-api image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repositories
        shell: bash
        run: |
          set -euo pipefail
          ref="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          git clone --depth 1 --branch "$ref" "https://github.com/${GITHUB_REPOSITORY}.git" .
          git clone --depth 1 --branch v1.19.0 https://github.com/park285/shared-go.git ../shared-go
          git clone --depth 1 --branch v0.22.0 https://github.com/park285/iris-client-go.git ../iris-client-go
      - name: Build unified runtime image
        shell: bash
        run: |
          set -euo pipefail
          docker buildx build --load \
            --build-context shared_go_workspace=../shared-go \
            --build-context iris_client_go_workspace=../iris-client-go \
            -f hololive/hololive-api/Dockerfile \
            -t hololive-api:ci \
            .
