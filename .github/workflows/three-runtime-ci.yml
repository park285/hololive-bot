name: Three Runtime Integration CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: three-runtime-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  source-snapshot:
    name: Source snapshot diagnostics
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
      - name: Archive source tree
        shell: bash
        run: |
          set -euo pipefail
          tar --exclude=.git -czf "${RUNNER_TEMP}/hololive-bot-source.tar.gz" .
      - name: Upload source snapshot
        uses: actions/upload-artifact@v4
        with:
          name: hololive-bot-source-${{ github.sha }}
          path: ${{ runner.temp }}/hololive-bot-source.tar.gz
          if-no-files-found: error
          retention-days: 1

  go-test:
    name: Go test (${{ matrix.module }})
    runs-on: ubuntu-latest
    container: golang:1.26.4-bookworm
    strategy:
      fail-fast: false
      matrix:
        module:
          - hololive/hololive-shared
          - hololive/hololive-kakao-bot-go
          - hololive/hololive-admin-api
          - hololive/hololive-llm-sched
          - hololive/hololive-alarm-worker
          - hololive/hololive-youtube-producer
          - hololive/hololive-api
    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@v5
        with:
          path: hololive-bot
          fetch-depth: 1
      - name: Test module
        shell: bash
        env:
          GOWORK: "off"
        run: |
          set -euo pipefail
          cd "hololive-bot/${{ matrix.module }}"
          go test ./...

  race:
    name: Race-sensitive packages
    runs-on: ubuntu-latest
    container: golang:1.26.4-bookworm
    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@v5
        with:
          path: hololive-bot
          fetch-depth: 1
      - name: Alarm client and lifecycle race tests
        shell: bash
        env:
          GOWORK: "off"
        run: |
          set -euo pipefail
          cd hololive-bot/hololive/hololive-shared
          go test -race ./pkg/service/alarm/...
          go test -race ./pkg/applifecycle/...

  architecture:
    name: Architecture boundary gate
    runs-on: ubuntu-latest
    container: golang:1.26.4-bookworm
    steps:
      - name: Checkout hololive-bot
        uses: actions/checkout@v5
        with:
          path: hololive-bot
          fetch-depth: 1
      - name: Checkout shared-go
        uses: actions/checkout@v5
        with:
          repository: park285/shared-go
          ref: v1.19.0
          path: shared-go
          fetch-depth: 1
      - name: Checkout iris-client-go
        uses: actions/checkout@v5
        with:
          repository: park285/iris-client-go
          ref: v0.23.0
          path: iris-client-go
          fetch-depth: 1
      - name: Run architecture contracts
        shell: bash
        run: |
          set -euo pipefail
          cd hololive-bot
          ./scripts/architecture/ci-boundary-gate.sh

  compose:
    name: Render production topology
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@v5
        with:
          path: hololive-bot
          fetch-depth: 1
      - name: Render Compose
        shell: bash
        env:
          DB_PASSWORD: ci-db-password
          CACHE_PASSWORD: ci-cache-password
          ADMIN_PASS_BCRYPT: ci-bcrypt-placeholder
          SESSION_SECRET: ci-session-secret
          API_SECRET_KEY: ci-api-secret
          KAKAO_ROOMS: ci-room
          HOLODEX_API_KEY: ci-holodex-key
          HOLOLIVE_API_ENV_FILE: /dev/null
          HOLOLIVE_ALARM_WORKER_ENV_FILE: /dev/null
        run: |
          set -euo pipefail
          cd hololive-bot
          docker compose -f deploy/compose/docker-compose.prod.yml config --quiet

  image:
    name: Build hololive-api image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout hololive-bot
        uses: actions/checkout@v5
        with:
          path: hololive-bot
          fetch-depth: 1
      - name: Checkout shared-go
        uses: actions/checkout@v5
        with:
          repository: park285/shared-go
          ref: v1.19.0
          path: shared-go
          fetch-depth: 1
      - name: Checkout iris-client-go
        uses: actions/checkout@v5
        with:
          repository: park285/iris-client-go
          ref: v0.23.0
          path: iris-client-go
          fetch-depth: 1
      - name: Build unified runtime image
        shell: bash
        run: |
          set -euo pipefail
          docker buildx build --load \
            --build-context shared_go_workspace=shared-go \
            --build-context iris_client_go_workspace=iris-client-go \
            -f hololive-bot/hololive/hololive-api/Dockerfile \
            -t hololive-api:ci \
            hololive-bot