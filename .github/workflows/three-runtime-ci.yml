name: Three Runtime Integration CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: three-runtime-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: 1.26.4

jobs:
  go-test:
    name: Go test (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - hololive/hololive-shared
          - hololive/hololive-kakao-bot-go
          - hololive/hololive-admin-api
          - hololive/hololive-llm-sched
          - hololive/hololive-alarm-worker
          - hololive/hololive-youtube-producer
          - hololive/hololive-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
      - name: Test module
        working-directory: ${{ matrix.module }}
        env:
          GOWORK: "off"
        run: go test ./...

  race:
    name: Race-sensitive packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
      - name: Alarm client and lifecycle race tests
        working-directory: hololive/hololive-shared
        env:
          GOWORK: "off"
        run: |
          go test -race ./pkg/service/alarm/...
          go test -race ./pkg/applifecycle/...

  contracts:
    name: Architecture and Compose contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: park285/shared-go
          ref: v1.19.0
          path: external/shared-go
      - uses: actions/checkout@v4
        with:
          repository: park285/iris-client-go
          ref: v0.22.0
          path: external/iris-client-go
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
      - name: Link workspace dependencies
        run: |
          ln -sfn "$GITHUB_WORKSPACE/external/shared-go" "$GITHUB_WORKSPACE/../shared-go"
          ln -sfn "$GITHUB_WORKSPACE/external/iris-client-go" "$GITHUB_WORKSPACE/../iris-client-go"
      - name: Render production topology
        run: docker compose -f deploy/compose/docker-compose.runtime3.yml config --quiet
      - name: Architecture boundary gate
        run: ./scripts/architecture/ci-boundary-gate.sh

  image:
    name: Build hololive-api image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: park285/shared-go
          ref: v1.19.0
          path: external/shared-go
      - uses: actions/checkout@v4
        with:
          repository: park285/iris-client-go
          ref: v0.22.0
          path: external/iris-client-go
      - uses: docker/setup-buildx-action@v3
      - name: Build unified runtime image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: hololive/hololive-api/Dockerfile
          push: false
          tags: hololive-api:ci
          build-contexts: |
            shared_go_workspace=external/shared-go
            iris_client_go_workspace=external/iris-client-go
