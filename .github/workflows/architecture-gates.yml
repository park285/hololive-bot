name: Architecture Gates

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: architecture-gates-${{ github.ref }}
  cancel-in-progress: true

jobs:
  architecture-gates:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.work
          cache-dependency-path: |
            go.work.sum
            shared-go/go.sum
            hololive/hololive-shared/go.sum
            hololive/hololive-kakao-bot-go/go.sum
            hololive/hololive-llm-sched/go.sum
            hololive/hololive-stream-ingester/go.sum
            hololive/hololive-dispatcher-go/go.sum

      - name: Normalize go.mod replace directives
        run: |
          for mod in hololive/hololive-shared hololive/hololive-kakao-bot-go; do
            if grep -q 'github.com/park285/iris-client-go =>' "$mod/go.mod"; then
              (cd "$mod" && go mod edit -dropreplace github.com/park285/iris-client-go)
            fi
          done

      - name: Setup Rust (nightly)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-02-23
          components: rustfmt, clippy

      - name: Run architecture boundary gates (M0 + M1 + M4 + M6)
        run: ./scripts/architecture/ci-boundary-gate.sh

      - name: Summarize Go import graph output
        if: always()
        run: |
          {
            echo '## Go import graph artifact'
            if [ -f artifacts/architecture/go-workspace-import-graph.txt ]; then
              echo ''
              echo 'Generated locally inside the workflow workspace:'
              echo '- `artifacts/architecture/go-workspace-import-graph.txt`'
              echo ''
              echo 'Preview:'
              echo '```text'
              head -n 40 artifacts/architecture/go-workspace-import-graph.txt
              echo '```'
            else
              echo ''
              echo 'Import graph file was not generated.'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
