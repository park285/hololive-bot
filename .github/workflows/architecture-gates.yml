name: Architecture Gates

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: architecture-gates-${{ github.ref }}
  cancel-in-progress: true

jobs:
  architecture-gates:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.work
          cache-dependency-path: |
            go.work.sum
            shared-go/go.sum
            hololive/hololive-shared/go.sum
            hololive/hololive-kakao-bot-go/go.sum
            hololive/hololive-llm-sched/go.sum
            hololive/hololive-stream-ingester/go.sum
            hololive/hololive-dispatcher-go/go.sum

      - name: Normalize go.mod replace directives
        run: |
          for mod in hololive/hololive-shared hololive/hololive-kakao-bot-go; do
            if grep -q 'github.com/park285/iris-client-go =>' "$mod/go.mod"; then
              (cd "$mod" && go mod edit -dropreplace github.com/park285/iris-client-go)
            fi
          done

      - name: Setup Rust (nightly)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-02-23
          components: rustfmt, clippy

      - name: Run architecture boundary gates (M0 + M1 + M4 + M6)
        run: ./scripts/architecture/ci-boundary-gate.sh

      - name: Upload Go import graph artifact
        if: always()
        uses: actions/upload-artifact@v5.0.0
        with:
          name: go-workspace-import-graph
          path: artifacts/architecture/go-workspace-import-graph.txt
