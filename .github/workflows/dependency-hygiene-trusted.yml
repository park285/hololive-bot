name: Dependency Hygiene Trusted

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: dependency-hygiene-trusted-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  dependency-audit:
    timeout-minutes: 30
    runs-on: [self-hosted, linux, x64, hololive-ci]
    strategy:
      fail-fast: false
      matrix:
        include:
          - module: shared-go
            slug: shared-go
          - module: hololive/hololive-shared
            slug: hololive-shared
          - module: hololive/hololive-kakao-bot-go
            slug: hololive-kakao-bot-go
          - module: hololive/hololive-admin-api
            slug: hololive-admin-api
          - module: hololive/hololive-alarm-worker
            slug: hololive-alarm-worker
          - module: hololive/hololive-llm-sched
            slug: hololive-llm-sched
          - module: hololive/hololive-youtube-producer
            slug: hololive-youtube-producer
    defaults:
      run:
        working-directory: ${{ matrix.module }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.work
          cache-dependency-path: |
            go.work.sum
            ${{ matrix.module }}/go.sum

      - name: Normalize go.mod replace directives
        working-directory: ${{ github.workspace }}
        run: ./scripts/ci/normalize-iris-client-replaces.sh

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Capture Dependency Update Report
        env:
          GOWORK: off
        run: go list -m -u -mod=readonly all > dependency-updates.txt

      - name: Run govulncheck
        env:
          GOWORK: ${{ github.workspace }}/go.work
        run: |
          set -o pipefail
          govulncheck ./... | tee govulncheck.txt

      - name: Summarize dependency reports
        if: always()
        run: |
          {
            echo "## Dependency hygiene: ${{ matrix.slug }}"
            echo ''
            if [ -f dependency-updates.txt ]; then
              echo '### dependency-updates.txt'
              echo '```text'
              sed -n '1,40p' dependency-updates.txt
              echo '```'
            fi
            if [ -f govulncheck.txt ]; then
              echo '### govulncheck.txt'
              echo '```text'
              sed -n '1,80p' govulncheck.txt
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
