name: Dependency Hygiene

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  dependency-audit:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - module: shared-go
            slug: shared-go
          - module: hololive/hololive-shared
            slug: hololive-shared
          - module: hololive/hololive-kakao-bot-go
            slug: hololive-kakao-bot-go
          - module: hololive/hololive-llm-sched
            slug: hololive-llm-sched
          - module: hololive/hololive-stream-ingester
            slug: hololive-stream-ingester
          - module: hololive/hololive-dispatcher-go
            slug: hololive-dispatcher-go
    defaults:
      run:
        working-directory: ${{ matrix.module }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.work
          cache-dependency-path: |
            go.work.sum
            ${{ matrix.module }}/go.sum

      - name: Normalize go.mod replace directives
        working-directory: ${{ github.workspace }}
        run: |
          for mod in hololive/hololive-shared hololive/hololive-kakao-bot-go; do
            if grep -q 'github.com/park285/iris-client-go =>' "$mod/go.mod"; then
              (cd "$mod" && go mod edit -dropreplace github.com/park285/iris-client-go)
            fi
          done

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Capture Dependency Update Report
        continue-on-error: true
        run: go list -m -u -mod=readonly all > dependency-updates.txt

      - name: Run govulncheck
        continue-on-error: true
        run: |
          govulncheck ./... | tee govulncheck.txt

      - name: Upload Reports
        if: always()
        uses: actions/upload-artifact@v5.0.0
        with:
          name: dependency-hygiene-${{ matrix.slug }}
          path: |
            ${{ matrix.module }}/dependency-updates.txt
            ${{ matrix.module }}/govulncheck.txt
