name: Architecture Gates Trusted

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: architecture-gates-trusted-${{ github.ref }}
  cancel-in-progress: true

jobs:
  architecture-gates:
    timeout-minutes: 20
    runs-on: [self-hosted, linux, x64, hololive-ci]
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.work
          cache-dependency-path: |
            go.work.sum
            shared-go/go.sum
            hololive/hololive-shared/go.sum
            hololive/hololive-kakao-bot-go/go.sum
            hololive/hololive-admin-api/go.sum
            hololive/hololive-alarm-worker/go.sum
            hololive/hololive-llm-sched/go.sum
            hololive/hololive-stream-ingester/go.sum

      - name: Normalize go.mod replace directives
        run: ./scripts/ci/normalize-iris-client-replaces.sh

      - name: Guard committed go.work paths
        run: |
          set -euo pipefail
          awk '$1 ~ /^\.\// || $1 ~ /^\.\.\// { print $1 }' go.work | while read -r path; do
            case "$path" in
              ./*) [ -e "$path" ] || { echo "go.work path does not exist: $path" >&2; exit 1; } ;;
              ../*) echo "go.work must not reference paths outside the repository: $path" >&2; exit 1 ;;
            esac
          done

      - name: Setup Rust (nightly)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-02-23
          components: rustfmt, clippy

      - name: Install architecture gate tools
        run: |
          if ! command -v rg >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y ripgrep
          fi

      - name: Run architecture boundary gates (M0 + M1 + M2 + M4 + M6)
        run: ./scripts/architecture/ci-boundary-gate.sh

      - name: Summarize Go import graph output
        if: always()
        run: |
          {
            echo '## Go import graph artifact'
            if [ -f artifacts/architecture/go-workspace-import-graph.txt ]; then
              echo ''
              echo 'Generated locally inside the workflow workspace:'
              echo '- `artifacts/architecture/go-workspace-import-graph.txt`'
              echo ''
              echo 'Preview:'
              echo '```text'
              head -n 40 artifacts/architecture/go-workspace-import-graph.txt
              echo '```'
            else
              echo ''
              echo 'Import graph file was not generated.'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  alarm-dispatch-postgres-integration:
    timeout-minutes: 15
    runs-on: [self-hosted, linux, x64, hololive-ci]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dispatch_test
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d dispatch_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.work
          cache-dependency-path: |
            go.work.sum
            shared-go/go.sum
            hololive/hololive-shared/go.sum
            hololive/hololive-kakao-bot-go/go.sum
            hololive/hololive-admin-api/go.sum
            hololive/hololive-alarm-worker/go.sum
            hololive/hololive-llm-sched/go.sum
            hololive/hololive-stream-ingester/go.sum

      - name: Normalize go.mod replace directives
        run: ./scripts/ci/normalize-iris-client-replaces.sh

      - name: Run alarm dispatch PostgreSQL integration tests
        env:
          TEST_DATABASE_URL: postgres://postgres:postgres@localhost:55432/dispatch_test?sslmode=disable
        run: go test -tags=integration ./hololive/hololive-shared/pkg/service/alarm/dispatchoutbox
