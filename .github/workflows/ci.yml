name: ci

# GitHub CI 는 secret-free fast gate만 책임진다.
# private workspace checkout, full local-ci, race, dependency hygiene, frontend full build는
# 로컬 pre-push 또는 non-PR security workflow 가 책임진다.

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GOCACHE: /tmp/go-cache
  GOTMPDIR: /tmp

jobs:
  secret-free-gate:
    name: secret-free-gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout hololive-bot
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Workflow PR boundary and gate ownership
        run: bash scripts/ci/check-workflow-secrets.sh

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.work.sum
            go.sum
            admin-dashboard/backend/go.sum
            hololive/*/go.sum

      - name: Shell syntax
        run: |
          while IFS= read -r script; do
            bash -n "$script"
          done < <(find scripts -type f -name '*.sh' | sort)

      - name: Secret-free Go compile smoke
        working-directory: hololive/hololive-shared
        run: GOWORK=off go test -run '^$' ./pkg/constants/...

      - name: gofmt
        run: |
          mapfile -t files < <(find . -path './.git' -prune -o -name '*.go' -print)
          if (( ${#files[@]} == 0 )); then
            exit 0
          fi

          unformatted="$(gofmt -l "${files[@]}")"
          if [[ -n "${unformatted}" ]]; then
            echo "::error::gofmt required for the following files:"
            echo "${unformatted}"
            exit 1
          fi
