name: ci

# PUBLIC 저장소의 canonical PR gate. 비밀이 필요 없는 정책·Go·frontend 검증은
# GitHub Actions에서 독립적으로 증적을 남기고, 운영·배포·대용량 분석은 로컬 pre-push와
# non-PR security workflow가 계속 책임진다.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  GOCACHE: /tmp/go-cache
  GOTMPDIR: /tmp

jobs:
  policy:
    name: policy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout hololive-bot
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Workflow PR boundary and gate ownership
        run: bash scripts/ci/check-workflow-secrets.sh

      - name: Shell syntax
        run: bash scripts/ci/shell-syntax-sweep.sh

      - name: gofmt
        run: bash scripts/ci/check-gofmt.sh

  go-modules:
    name: go-${{ matrix.module }}
    needs: policy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        module:
          - "."
          - admin-dashboard/backend
          - hololive/hololive-api
          - hololive/hololive-alarm-worker
          - hololive/hololive-dbtest
          - hololive/hololive-shared
          - hololive/hololive-youtube-producer
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout hololive-bot
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.sum
            admin-dashboard/backend/go.sum
            hololive/*/go.sum

      - name: Module test and race gate
        env:
          GOWORK: "off"
          GOMAXPROCS: "2"
          GOMEMLIMIT: 5GiB
        run: bash scripts/ci/public-pr-go-gate.sh "${{ matrix.module }}"

  frontend:
    name: frontend
    needs: policy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout hololive-bot
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache-dependency-path: admin-dashboard/backend/go.sum

      - name: Frontend test, lint, generation and build gate
        env:
          GOWORK: "off"
        run: bash scripts/ci/public-pr-frontend-gate.sh
