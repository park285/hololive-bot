name: ci

# Secret-free fast, full, and static-security gates for pull requests.
# Commands remain in repository-owned scripts so the workflow boundary checker
# can enforce read-only permissions and credential-less checkouts uniformly.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GOCACHE: /tmp/go-cache
  GOTMPDIR: /tmp

jobs:
  fast-gate:
    name: fast-gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout hololive-bot
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Workflow PR boundary and gate ownership
        run: bash scripts/ci/check-workflow-secrets.sh

      - name: Workflow policy regression tests
        run: bash scripts/ci/check-workflow-secrets_test.sh

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.work.sum
            go.sum
            admin-dashboard/backend/go.sum
            hololive/*/go.sum

      - name: Shell syntax
        run: |
          while IFS= read -r script; do
            bash -n "$script"
          done < <(find scripts -type f -name '*.sh' | sort)

      - name: Secret-free Go compile smoke
        env:
          GOWORK: off
        run: |
          for module in \
            . \
            hololive/hololive-shared \
            hololive/hololive-api \
            hololive/hololive-alarm-worker \
            hololive/hololive-youtube-producer \
            admin-dashboard/backend; do
            echo "compile ${module}"
            (cd "${module}" && go build ./... && go test -run '^$' ./...)
          done

      - name: gofmt
        run: |
          mapfile -t files < <(find . -path './.git' -prune -o -name '*.go' -print)
          if (( ${#files[@]} == 0 )); then
            exit 0
          fi
          unformatted="$(gofmt -l "${files[@]}")"
          if [[ -n "${unformatted}" ]]; then
            echo "::error::gofmt required for the following files:"
            echo "${unformatted}"
            exit 1
          fi

  full-verification:
    name: full-verification
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout hololive-bot
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: hololive-bot
          persist-credentials: false

      - name: Checkout shared-go
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: park285/shared-go
          path: shared-go
          persist-credentials: false

      - name: Checkout iris-client-go
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: park285/iris-client-go
          path: iris-client-go
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: hololive-bot/go.mod
          cache-dependency-path: |
            hololive-bot/go.work.sum
            hololive-bot/go.sum
            hololive-bot/admin-dashboard/backend/go.sum
            hololive-bot/hololive/*/go.sum
            shared-go/go.sum
            iris-client-go/go.sum

      - name: Show runner Node version
        run: node --version

      - name: Workflow and shell policy gates
        working-directory: hololive-bot
        run: bash scripts/ci/server-pr-verification.sh policy

      - name: Architecture M0 boundaries
        working-directory: hololive-bot
        run: bash scripts/ci/server-pr-architecture.sh m0

      - name: Architecture M1 data contracts
        working-directory: hololive-bot
        run: bash scripts/ci/server-pr-architecture.sh m1

      - name: Architecture M2 documentation and ownership
        working-directory: hololive-bot
        run: bash scripts/ci/server-pr-architecture.sh m2

      - name: Architecture M4 compose and size budgets
        working-directory: hololive-bot
        run: bash scripts/ci/server-pr-architecture.sh m4

      - name: Architecture M6 governance
        working-directory: hololive-bot
        run: bash scripts/ci/server-pr-architecture.sh m6

      - name: Full Go workspace tests and vet
        working-directory: hololive-bot
        run: bash scripts/ci/server-pr-verification.sh go

      - name: Admin frontend tests and build
        working-directory: hololive-bot
        run: bash scripts/ci/server-pr-verification.sh frontend

  static-security:
    name: static-security
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout hololive-bot
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: hololive-bot
          persist-credentials: false

      - name: Checkout shared-go
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: park285/shared-go
          path: shared-go
          persist-credentials: false

      - name: Checkout iris-client-go
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: park285/iris-client-go
          path: iris-client-go
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: hololive-bot/go.mod
          cache-dependency-path: |
            hololive-bot/go.work.sum
            hololive-bot/go.sum
            hololive-bot/admin-dashboard/backend/go.sum
            hololive-bot/hololive/*/go.sum
            shared-go/go.sum
            iris-client-go/go.sum

      - name: Run canonical server security analysis
        working-directory: hololive-bot
        run: bash scripts/ci/server-pr-security.sh
