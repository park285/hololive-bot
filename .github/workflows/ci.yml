name: ci

# GitHub CI 는 secret-free fast gate만 책임진다.
# full local-ci, race, dependency hygiene, frontend full build는
# 로컬 pre-push 또는 non-PR security workflow 가 책임진다.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GOCACHE: /tmp/go-cache
  GOTMPDIR: /tmp

jobs:
  fast-gate:
    name: fast-gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout hololive-bot
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Workflow PR boundary and gate ownership
        run: bash scripts/ci/check-workflow-secrets.sh

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.work.sum
            go.sum
            admin-dashboard/backend/go.sum
            hololive/*/go.sum

      - name: Shell syntax
        run: bash scripts/ci/shell-syntax-sweep.sh

      - name: Secret-free Go compile smoke
        env:
          GOWORK: off
        run: |
          for module in \
            . \
            hololive/hololive-shared \
            hololive/hololive-api \
            hololive/hololive-alarm-worker \
            hololive/hololive-youtube-producer \
            admin-dashboard/backend; do
            echo "compile ${module}"
            (cd "${module}" && go build ./... && go test -run '^$' ./...)
          done

      - name: gofmt
        run: bash scripts/ci/check-gofmt.sh
