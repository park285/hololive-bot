name: ci

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  GOCACHE: /tmp/go-cache
  GOTMPDIR: /tmp

jobs:
  secret-free-gate:
    name: secret-free-gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout hololive-bot
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: "1.26.4"
          cache-dependency-path: |
            go.work.sum
            go.sum
            admin-dashboard/backend/go.sum
            hololive/*/go.sum

      - name: Workflow secret boundary
        run: bash scripts/ci/check-workflow-secrets.sh

      - name: Shell syntax
        run: |
          bash -n scripts/ci/*.sh
          bash -n scripts/architecture/*.sh

      - name: Secret-free Go compile smoke
        working-directory: hololive/hololive-shared
        run: GOWORK=off go test -run '^$' ./pkg/constants/...

      - name: gofmt
        run: |
          mapfile -t files < <(find . -path './.git' -prune -o -name '*.go' -print)
          if (( ${#files[@]} == 0 )); then
            exit 0
          fi

          unformatted="$(gofmt -l "${files[@]}")"
          if [[ -n "${unformatted}" ]]; then
            echo "::error::gofmt required for the following files:"
            echo "${unformatted}"
            exit 1
          fi
