name: security

# Non-PR security scan. Heavy full verification stays in scripts/ci/pre-push-gate.sh.
on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GOCACHE: /tmp/go-cache
  GOPRIVATE: github.com/park285/*
  GOTMPDIR: /tmp
  GOVULNCHECK_VERSION: v1.4.0
  GOSEC_VERSION: v2.27.1
  NILAWAY_VERSION: v0.0.0-20260617211854-01ab7e30fbe0

jobs:
  dependency-security:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        shell: bash
        working-directory: hololive-bot
    steps:
      - name: Checkout hololive-bot
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: hololive-bot
          persist-credentials: false

      - name: Checkout shared-go
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: park285/shared-go
          token: ${{ secrets.MODULES_TOKEN }}
          path: shared-go
          persist-credentials: false

      - name: Checkout iris-client-go
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: park285/iris-client-go
          token: ${{ secrets.MODULES_TOKEN }}
          path: iris-client-go
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: hololive-bot/go.mod
          cache-dependency-path: |
            hololive-bot/go.work.sum
            hololive-bot/go.sum
            hololive-bot/admin-dashboard/backend/go.sum
            hololive-bot/hololive/*/go.sum
            shared-go/go.sum
            iris-client-go/go.sum

      - name: Install security tools
        run: |
          export GOBIN="${RUNNER_TEMP}/go-tools"
          mkdir -p "${GOBIN}"
          go install "golang.org/x/vuln/cmd/govulncheck@${GOVULNCHECK_VERSION}"
          go install "github.com/securego/gosec/v2/cmd/gosec@${GOSEC_VERSION}"
          go install "go.uber.org/nilaway/cmd/nilaway@${NILAWAY_VERSION}"
          echo "${GOBIN}" >> "${GITHUB_PATH}"

      - name: Resolve workspace package patterns
        run: |
          source scripts/ci/go-workspace-modules.sh
          patterns="$(go_workspace_package_patterns | sed 's#^\./\.\./#../#' | tr '\n' ' ')"
          patterns="./... ${patterns}"
          echo "GO_PKG_PATTERNS=${patterns}" >> "${GITHUB_ENV}"
          echo "resolved patterns: ${patterns}"

      - name: gosec
        run: |
          read -ra pkgs <<< "${GO_PKG_PATTERNS}"
          owned_pkgs=()
          for pkg in "${pkgs[@]}"; do
            case "${pkg}" in
              ../shared-go/...)
                continue
                ;;
            esac
            owned_pkgs+=("${pkg}")
          done
          gosec -quiet -fmt text "${owned_pkgs[@]}"

      - name: NilAway
        run: |
          read -ra pkgs <<< "${GO_PKG_PATTERNS}"
          owned_pkgs=()
          for pkg in "${pkgs[@]}"; do
            case "${pkg}" in
              ../shared-go/...)
                continue
                ;;
            esac
            owned_pkgs+=("${pkg}")
          done
          for pkg in "${owned_pkgs[@]}"; do
            nilaway -pretty-print "${pkg}"
          done

      - name: govulncheck
        run: |
          mapfile -t modules < <(go work edit -json | python3 -c 'import json, sys; print("\n".join(use["DiskPath"] for use in json.load(sys.stdin)["Use"]))')
          for module in "${modules[@]}"; do
            echo "govulncheck ${module}"
            (cd "${module}" && govulncheck ./...)
          done
