name: agent security runtime diagnose

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnose:
    if: github.head_ref == 'agent/security-runtime-ci-hardening-20260715'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout patch branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: agent/security-runtime-ci-hardening-20260715
          persist-credentials: false

      - name: Capture patch error
        run: |
          set +e
          python3 scripts/ci/agent_security_runtime_patch.py > /tmp/patch.log 2>&1
          status=$?
          cat /tmp/patch.log
          printf '%s\n' "${status}" > /tmp/patch-status
          exit 0

      - name: Upload patch diagnostics
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: runtime-patch-diagnostics
          path: |
            /tmp/patch.log
            /tmp/patch-status
          if-no-files-found: error
          retention-days: 1

      - name: Fail when patch failed
        run: exit "$(cat /tmp/patch-status)"
