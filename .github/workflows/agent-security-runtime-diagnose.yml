name: agent security runtime diagnose

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  diagnose:
    if: github.head_ref == 'agent/security-runtime-ci-hardening-20260715'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout patch branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: agent/security-runtime-ci-hardening-20260715
          persist-credentials: true

      - name: Capture patch error
        run: |
          set +e
          python3 scripts/ci/agent_security_runtime_patch.py > /tmp/patch.log 2>&1
          status=$?
          cat /tmp/patch.log
          if [[ ${status} -eq 0 ]]; then
            exit 0
          fi
          mkdir -p .agent-diagnostics
          cp /tmp/patch.log .agent-diagnostics/runtime-patch.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .agent-diagnostics/runtime-patch.log
          git commit -m "chore: record runtime patch application failure"
          git push origin HEAD:agent/security-runtime-ci-hardening-20260715
          exit "${status}"
