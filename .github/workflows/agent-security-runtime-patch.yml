name: agent security runtime verify

on:
  push:
    branches:
      - agent/security-runtime-ci-hardening-20260715
    paths-ignore:
      - .agent-diagnostics/**

permissions:
  contents: write

concurrency:
  group: agent-security-runtime-verify
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout hololive-bot patch branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: agent/security-runtime-ci-hardening-20260715
          path: hololive-bot
          fetch-depth: 0
          persist-credentials: true

      - name: Checkout shared-go
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: park285/shared-go
          path: shared-go
          persist-credentials: false

      - name: Checkout iris-client-go
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: park285/iris-client-go
          path: iris-client-go
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: hololive-bot/go.mod
          cache-dependency-path: |
            hololive-bot/go.work.sum
            hololive-bot/go.sum
            hololive-bot/admin-dashboard/backend/go.sum
            hololive-bot/hololive/*/go.sum
            shared-go/go.sum
            iris-client-go/go.sum

      - name: Format changed Go files
        working-directory: hololive-bot
        run: |
          mapfile -t files < <(git diff --name-only origin/main...HEAD -- '*.go')
          if (( ${#files[@]} > 0 )); then
            gofmt -w "${files[@]}"
          fi

      - name: Verify runtime security changes
        working-directory: hololive-bot
        run: |
          set +e
          set -o pipefail
          {
            bash scripts/ci/check-workflow-secrets.sh
            bash scripts/ci/check-workflow-secrets_test.sh
            while IFS= read -r script; do
              bash -n "$script"
            done < <(find scripts -type f -name '*.sh' | sort)
            go test -count=1 \
              ./hololive/hololive-shared/pkg/domain \
              ./hololive/hololive-shared/pkg/health \
              ./hololive/hololive-shared/pkg/service/youtube/scraper/... \
              ./hololive/hololive-api/internal/planes/bot/internal/render \
              ./hololive/hololive-api/internal/planes/bot/internal/command/handlers \
              ./hololive/hololive-alarm-worker/internal/service/alarm/checker/internal/checking/notifier \
              ./hololive/hololive-youtube-producer/internal/runtime/polling
            source scripts/ci/go-workspace-modules.sh
            mapfile -t packages < <(
              {
                printf './...\n'
                go_workspace_package_patterns | sed 's#^\./\.\./#../#'
              } | awk 'NF'
            )
            go test -count=1 "${packages[@]}"
            go vet "${packages[@]}"
            git diff --check
          } 2>&1 | tee /tmp/runtime-security-verify.log
          status=${PIPESTATUS[0]}
          printf '%s\n' "${status}" > /tmp/runtime-security-verify.status
          exit "${status}"

      - name: Persist verification failure
        if: failure()
        working-directory: hololive-bot
        run: |
          mkdir -p .agent-diagnostics
          cp /tmp/runtime-security-verify.log .agent-diagnostics/runtime-verify.log 2>/dev/null || echo "verification log unavailable" > .agent-diagnostics/runtime-verify.log
          cp /tmp/runtime-security-verify.status .agent-diagnostics/runtime-verify.status 2>/dev/null || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .agent-diagnostics
          if ! git diff --cached --quiet; then
            git commit -m "chore: record runtime security verification failure"
            git push origin HEAD:agent/security-runtime-ci-hardening-20260715
          fi

      - name: Commit verified cleanup
        if: success()
        working-directory: hololive-bot
        run: |
          git rm .github/workflows/agent-security-runtime-patch.yml scripts/ci/agent_security_runtime_patch.py
          rm -rf .agent-diagnostics
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "security: finalize runtime boundary hardening"
          git push origin HEAD:agent/security-runtime-ci-hardening-20260715
