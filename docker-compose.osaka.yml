services:
  stream-ingester:
    env_file: !override
      - /run/hololive-bot/env
    environment:
      LOG_MAX_SIZE_MB: "2"
      LOG_MAX_BACKUPS: "2"
      LOG_MAX_AGE_DAYS: "7"
      LOG_COMPRESS: "true"
      CACHE_SOCKET_PATH: ""
      CACHE_HOST: ${OSAKA_CACHE_HOST:-100.100.1.3}
      CACHE_PORT: ${OSAKA_CACHE_PORT:-6379}
      POSTGRES_SOCKET_PATH: ""
      POSTGRES_HOST: ${OSAKA_POSTGRES_HOST:-100.100.1.3}
      POSTGRES_PORT: ${OSAKA_POSTGRES_PORT:-5433}
      CLIPROXY_BASE_URL: ${OSAKA_CLIPROXY_BASE_URL:-http://100.100.1.3:8787/v1}
    volumes: !override
      - ./data:/app/data
      - ./logs:/app/logs
      - ./runtime-config:/app/runtime-config:ro
      - /run/hololive-bot/certs:/run/hololive-bot/certs:ro
    logging:
      driver: "json-file"
      options:
        max-size: "2m"
        max-file: "2"
    deploy:
      resources:
        limits:
          memory: 512m

  youtube-scraper:
    env_file: !override
      - /run/hololive-bot/env
    environment:
      LOG_MAX_SIZE_MB: "2"
      LOG_MAX_BACKUPS: "2"
      LOG_MAX_AGE_DAYS: "7"
      LOG_COMPRESS: "true"
      CACHE_SOCKET_PATH: ""
      CACHE_HOST: ${OSAKA_CACHE_HOST:-100.100.1.3}
      CACHE_PORT: ${OSAKA_CACHE_PORT:-6379}
      POSTGRES_SOCKET_PATH: ""
      POSTGRES_HOST: ${OSAKA_POSTGRES_HOST:-100.100.1.3}
      POSTGRES_PORT: ${OSAKA_POSTGRES_PORT:-5433}
      CLIPROXY_BASE_URL: ${OSAKA_CLIPROXY_BASE_URL:-http://100.100.1.3:8787/v1}
    volumes: !override
      - ./data:/app/data
      - ./logs:/app/logs
      - ./runtime-config:/app/runtime-config:ro
      - /run/hololive-bot/certs:/run/hololive-bot/certs:ro
    logging:
      driver: "json-file"
      options:
        max-size: "2m"
        max-file: "2"
    deploy:
      resources:
        limits:
          memory: 768m
