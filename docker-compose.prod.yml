name: hololive-bot

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "5m"
    max-file: "3"

x-restart-logging: &restart-logging
  restart: always
  logging: *default-logging

x-autoheal-service: &autoheal-service
  <<: *restart-logging
  labels:
    deunhealth.restart.on.unhealthy: "true"

x-app-file-log-env: &app-file-log-env
  LOG_LEVEL: ${LOG_LEVEL:-info}
  LOG_MAX_SIZE_MB: ${LOG_MAX_SIZE_MB:-5}
  LOG_MAX_BACKUPS: ${LOG_MAX_BACKUPS:-5}
  LOG_MAX_AGE_DAYS: ${LOG_MAX_AGE_DAYS:-30}
  LOG_COMPRESS: ${LOG_COMPRESS:-true}

x-security-hardening: &security-hardening
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  read_only: true
  tmpfs:
    - /tmp:size=64m,mode=1777

x-app-service: &app-service
  <<: [*autoheal-service, *security-hardening]
  env_file:
    - ${COMPOSE_ENV_FILE:-./.env}

x-public-dns: &public-dns
  - 8.8.8.8
  - 1.1.1.1

x-host-extra-hosts: &host-extra-hosts
  - "host.docker.internal:host-gateway"

x-iris-extra-hosts: &iris-extra-hosts
  - "host.docker.internal:host-gateway"
  - "vnic-kapu-iris-seoul-fk:100.100.1.5"
  - "vnic-kapu-iris-seoul-fk.tail742dd8.ts.net:100.100.1.5"

# DB/Cache용 보안 설정 (setuid/setgid 필요)
x-db-security: &db-security
  cap_drop:
    - ALL
  cap_add:
    - SETUID
    - SETGID
    - CHOWN
    - FOWNER
    - DAC_OVERRIDE
  read_only: true
  tmpfs:
    - /tmp:size=64m,mode=1777

x-db-service: &db-service
  <<: [*autoheal-service, *db-security]

x-go-build-base: &go-build-base
  context: .
  additional_contexts:
    shared_go_workspace: ${SHARED_GO_WORKSPACE_PATH:-./shared-go}
    iris_client_go_workspace: ${IRIS_CLIENT_GO_WORKSPACE_PATH:-../iris-client-go}

x-go-healthcheck: &go-healthcheck
  interval: 30s
  timeout: 5s
  start_period: 30s
  retries: 3

x-deploy-512m: &deploy-512m {resources: {limits: {memory: 512m}}}
x-deploy-384m: &deploy-384m {resources: {limits: {memory: 384m}}}
x-deploy-320m: &deploy-320m {resources: {limits: {memory: 320m}}}
x-deploy-256m: &deploy-256m {resources: {limits: {memory: 256m}}}
x-deploy-128m: &deploy-128m {resources: {limits: {memory: 128m}}}
x-deploy-32m: &deploy-32m {resources: {limits: {memory: 32m}}}

x-cache-env: &cache-env
  CACHE_SOCKET_PATH: /var/run/valkey/valkey-cache.sock
  CACHE_HOST: valkey-cache
  CACHE_PORT: 6379
  CACHE_PASSWORD: ${CACHE_PASSWORD:?set CACHE_PASSWORD in .env}

x-postgres-env: &postgres-env
  POSTGRES_HOST: host.docker.internal
  POSTGRES_PORT: "5433"
  POSTGRES_SOCKET_PATH: ""
  POSTGRES_DB: hololive
  POSTGRES_USER: ${HOLOLIVE_DB_USER:-hololive_runtime}
  POSTGRES_PASSWORD: ${DB_PASSWORD}
  POSTGRES_SSLMODE: ${POSTGRES_SSLMODE:-require}
  POSTGRES_QUERY_EXEC_MODE: ${POSTGRES_QUERY_EXEC_MODE:-exec}
  POSTGRES_AUTO_PREPARE_SCHEMA: "false"

x-iris-env: &iris-env
  IRIS_BASE_URL: ${IRIS_BASE_URL:-}
  IRIS_BASE_URL_FILE: ${IRIS_BASE_URL_FILE:-/app/runtime-config/iris_base_url}
  IRIS_TRANSPORT: ${IRIS_TRANSPORT:-h3}
  IRIS_H3_CA_CERT_FILE: ${IRIS_H3_CA_CERT_FILE:-/run/hololive-bot/certs/iris-ca.pem}
  IRIS_H3_SERVER_NAME: ${IRIS_H3_SERVER_NAME:-}
  IRIS_WEBHOOK_TOKEN: ${IRIS_WEBHOOK_TOKEN:?IRIS_WEBHOOK_TOKEN is required}
  IRIS_BOT_TOKEN: ${IRIS_BOT_TOKEN:?IRIS_BOT_TOKEN is required}

x-cliproxy-env: &cliproxy-env
  CLIPROXY_ENABLED: "true"
  CLIPROXY_BASE_URL: ${CLIPROXY_BASE_URL:-http://host.docker.internal:8787/v1}
  CLIPROXY_API_KEY: ${CLIPROXY_API_KEY:-}
  CLIPROXY_MODEL: ${CLIPROXY_MODEL:-gpt-5.4}
  CLIPROXY_REASONING_EFFORT: ${CLIPROXY_REASONING_EFFORT:-high}

x-majorevent-env: &majorevent-env
  MAJOREVENT_SCRAPER_ENABLED: "${MAJOREVENT_SCRAPER_ENABLED:-false}"
  MAJOREVENT_SCRAPE_HOUR_KST: "4"

x-scraper-env: &scraper-env
  SCRAPER_SCHEDULER_WORKER_COUNT: "${SCRAPER_SCHEDULER_WORKER_COUNT:-0}"
  SCRAPER_WORKER_COUNT: "${SCRAPER_WORKER_COUNT:-4}"
  SCRAPER_POLL_VIDEOS_INTERVAL_SECONDS: "${SCRAPER_POLL_VIDEOS_INTERVAL_SECONDS:-0}"
  SCRAPER_VIDEOS_SECONDS: "${SCRAPER_VIDEOS_SECONDS:-900}"
  SCRAPER_POLL_SHORTS_INTERVAL_SECONDS: "${SCRAPER_POLL_SHORTS_INTERVAL_SECONDS:-0}"
  SCRAPER_SHORTS_SECONDS: "${SCRAPER_SHORTS_SECONDS:-120}"
  SCRAPER_POLL_COMMUNITY_INTERVAL_SECONDS: "${SCRAPER_POLL_COMMUNITY_INTERVAL_SECONDS:-0}"
  SCRAPER_COMMUNITY_SECONDS: "${SCRAPER_COMMUNITY_SECONDS:-900}"
  SCRAPER_POLL_STATS_INTERVAL_SECONDS: "${SCRAPER_POLL_STATS_INTERVAL_SECONDS:-0}"
  SCRAPER_STATS_SECONDS: "${SCRAPER_STATS_SECONDS:-21600}"
  SCRAPER_POLL_LIVE_INTERVAL_SECONDS: "${SCRAPER_POLL_LIVE_INTERVAL_SECONDS:-0}"
  SCRAPER_LIVE_SECONDS: "${SCRAPER_LIVE_SECONDS:-600}"

x-go-volumes: &go-volumes
  - ./data:/app/data
  - ./logs:/app/logs
  - ./runtime-config:/app/runtime-config:ro
  - /run/hololive-bot/certs:/run/hololive-bot/certs:ro
  - valkey-cache-socket:/var/run/valkey:ro

x-go-basic-volumes: &go-basic-volumes
  - ./data:/app/data
  - ./logs:/app/logs
  - valkey-cache-socket:/var/run/valkey:ro

x-logs-runtime-cache-volumes: &logs-runtime-cache-volumes
  - ./logs:/app/logs
  - ./runtime-config:/app/runtime-config:ro
  - /run/hololive-bot/certs:/run/hololive-bot/certs:ro
  - valkey-cache-socket:/var/run/valkey:ro

x-db-cache-depends: &db-cache-depends
  holo-postgres:
    condition: service_healthy
  hololive-db-migrate:
    condition: service_completed_successfully
  valkey-cache:
    condition: service_healthy

services:
  # Storage & Infrastructure
  holo-postgres:
    <<: *db-service
    image: ${POSTGRES_IMAGE:-postgres:18}
    container_name: holo-postgres
    shm_size: 256mb
    environment:
      POSTGRES_DB: hololive
      POSTGRES_USER: ${POSTGRES_ADMIN_USER:-postgres_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
      POSTGRES_ADMIN_USER: ${POSTGRES_ADMIN_USER:-postgres_admin}
      POSTGRES_ADMIN_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
      HOLOLIVE_DB_USER: ${HOLOLIVE_DB_USER:-hololive_runtime}
      HOLOLIVE_MIGRATOR_USER: ${HOLOLIVE_MIGRATOR_USER:-hololive_migrator}
      HOLOLIVE_SCRAPER_USER: ${HOLOLIVE_SCRAPER_USER:-hololive_scraper}
      HOLOLIVE_SCRAPER_PASSWORD: ${HOLOLIVE_SCRAPER_PASSWORD:-}
      PGDATA: /var/lib/postgresql/data/pgdata
      PGPORT: "5433"
    volumes:
      - holo-pg-data:/var/lib/postgresql/data
      - ./backups:/backups
      - ./hololive/hololive-kakao-bot-go/scripts/init-db:/docker-entrypoint-initdb.d:ro
    tmpfs:
      - /tmp:size=64m,mode=1777
      - /var/run/postgresql:size=16m,mode=3775
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB -p 5433 && psql -U $$POSTGRES_USER -d $$POSTGRES_DB -p 5433 -c 'SELECT 1' -q -t" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy: *deploy-512m
    network_mode: host

  valkey-cache:
    <<: *db-service
    image: valkey/valkey:9.0.2-alpine3.23
    container_name: valkey-cache
    environment:
      CACHE_PASSWORD: ${CACHE_PASSWORD:?set CACHE_PASSWORD in .env}
    ports:
      - "127.0.0.1:6379:6379"
      - "${VALKEY_PORT_BIND_IP:-100.100.1.3}:6379:6379"
    volumes:
      - valkey-cache-data:/data
      - valkey-cache-socket:/var/run/valkey
    command:
      - /bin/sh
      - -c
      - exec valkey-server --unixsocket /var/run/valkey/valkey-cache.sock --unixsocketperm 777 --port 6379 --requirepass "$$CACHE_PASSWORD" --appendonly no --save "" --maxmemory 384mb --maxmemory-policy allkeys-lfu --loglevel notice --io-threads 4 --io-threads-do-reads yes --activedefrag yes --active-defrag-threshold-lower 10 --active-defrag-cycle-min 1 --active-defrag-cycle-max 25
    sysctls:
      - net.core.somaxconn=1024
    healthcheck:
      test: [ "CMD-SHELL", "REDISCLI_AUTH=\"$$CACHE_PASSWORD\" valkey-cli -s /var/run/valkey/valkey-cache.sock ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy: *deploy-512m
    networks:
      - hololive-net

  hololive-db-migrate:
    image: ${POSTGRES_IMAGE:-postgres:18}
    container_name: hololive-db-migrate
    restart: "no"
    environment:
      PGHOST: 127.0.0.1
      PGPORT: "5433"
      PGDATABASE: hololive
      PGUSER: ${HOLOLIVE_MIGRATOR_USER:-hololive_migrator}
      PGPASSWORD: ${DB_PASSWORD}
      POSTGRES_ADMIN_USER: ${POSTGRES_ADMIN_USER:-postgres_admin}
      POSTGRES_ADMIN_PASSWORD: ${DB_PASSWORD}
      HOLOLIVE_SCRAPER_USER: ${HOLOLIVE_SCRAPER_USER:-hololive_scraper}
      HOLOLIVE_SCRAPER_PASSWORD: ${HOLOLIVE_SCRAPER_PASSWORD:-}
    command:
      - /bin/sh
      - /migrations/bootstrap-and-apply.sh
    volumes:
      - ./hololive/hololive-kakao-bot-go/scripts/migrations:/migrations:ro
    depends_on:
      holo-postgres:
        condition: service_healthy
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    network_mode: host

  # Core Services
  hololive-bot:
    <<: *app-service
    image: hololive-kakao-bot-go:prod
    build:
      <<: *go-build-base
      dockerfile: hololive/hololive-kakao-bot-go/Dockerfile
      args:
        VERSION: ${HOLO_BOT_VERSION:-2.0.0}
    container_name: hololive-kakao-bot-go
    environment:
      <<: [*app-file-log-env, *iris-env, *cache-env, *postgres-env, *majorevent-env, *cliproxy-env]
      HOLOLIVE_HTTP_TRANSPORTS: ${HOLOLIVE_HTTP_TRANSPORTS:-h3}
      HOLOLIVE_H2C_ADDR: ${HOLOLIVE_H2C_ADDR:-:30001}
      HOLOLIVE_H3_ADDR: ${HOLOLIVE_H3_ADDR:-:30001}
      HOLOLIVE_H3_CERT_FILE: ${HOLOLIVE_H3_CERT_FILE:-/run/hololive-bot/certs/hololive-h3.crt}
      HOLOLIVE_H3_KEY_FILE: ${HOLOLIVE_H3_KEY_FILE:-/run/hololive-bot/certs/hololive-h3.key}
      HEALTHCHECK_CA_CERT_FILE: ${HOLOLIVE_H3_CERT_FILE:-/run/hololive-bot/certs/hololive-h3.crt}
      HEALTHCHECK_SERVER_NAME: ${HOLOLIVE_H3_SERVER_NAME:-100.100.1.3}
      # Dockerfile 기본값은 GOGC=200이지만 운영 Compose에서는 메모리 상한을 우선해 60으로 낮춥니다.
      GOGC: "60"
      LLM_SCHEDULER_INTERNAL_URL: http://llm-scheduler:30003
      NOTIFICATION_SCHEDULER_ROLE: "off"
      SERVER_PORT: 30001
      LOG_DIR: /app/logs
      GOMEMLIMIT: "450MiB"
      # 통합 Goroutine 모니터링용 외부 서비스 Health URL (llm 레포 서비스 → host.docker.internal)
      SERVICES_LLM_SCHEDULER_HEALTH_URL: http://llm-scheduler:30003/health
      SERVICES_GAME_BOT_TWENTYQ_HEALTH_URL: http://host.docker.internal:30081/health
      SERVICES_GAME_BOT_TURTLE_HEALTH_URL: http://host.docker.internal:30082/health
      APP_ENV: "production"
      # Docker Socket Proxy (보안: 직접 소켓 마운트 대신 제한된 API만 허용)
      DOCKER_HOST: tcp://docker-proxy:2375
    dns: *public-dns
    ports:
      - "127.0.0.1:30001:30001"
      - "${HOLOLIVE_BOT_PORT_BIND_IP:-100.100.1.3}:30001:30001"
      - "127.0.0.1:30001:30001/udp"
      - "${HOLOLIVE_BOT_PORT_BIND_IP:-100.100.1.3}:30001:30001/udp"
    volumes: *go-volumes
    extra_hosts: *iris-extra-hosts
    depends_on:
      <<: *db-cache-depends
      docker-proxy:
        condition: service_started
    deploy: *deploy-512m
    healthcheck:
      <<: *go-healthcheck
      test: ["CMD", "./bin/healthcheck", "https://127.0.0.1:30001/health"]
    networks:
      hololive-net:
        aliases:
          - hololive-bot
      docker-proxy-net: {}

  hololive-admin-api:
    <<: *app-service
    image: hololive-admin-api:prod
    build:
      <<: *go-build-base
      dockerfile: hololive/hololive-admin-api/Dockerfile
      args:
        VERSION: ${HOLO_ADMIN_API_VERSION:-${HOLO_BOT_VERSION:-2.0.0}}
    container_name: hololive-admin-api
    environment:
      <<: [*app-file-log-env, *cache-env, *postgres-env]
      SERVER_PORT: 30006
      LOG_DIR: /app/logs
      GOMEMLIMIT: "320MiB"
      APP_ENV: "production"
      LLM_SCHEDULER_INTERNAL_URL: http://llm-scheduler:30003
      SERVICES_LLM_SCHEDULER_HEALTH_URL: http://llm-scheduler:30003/health
      SERVICES_GAME_BOT_TWENTYQ_HEALTH_URL: http://host.docker.internal:30081/health
      SERVICES_GAME_BOT_TURTLE_HEALTH_URL: http://host.docker.internal:30082/health
    ports:
      - "127.0.0.1:30006:30006"
    volumes: *go-basic-volumes
    extra_hosts: *host-extra-hosts
    depends_on: *db-cache-depends
    deploy: *deploy-384m
    healthcheck:
      <<: *go-healthcheck
      test: ["CMD", "./bin/healthcheck", "http://127.0.0.1:30006/health"]
    networks:
      hololive-net:
        aliases:
          - hololive-admin-api

  hololive-alarm-worker:
    <<: *app-service
    image: hololive-alarm-worker:prod
    build:
      <<: *go-build-base
      dockerfile: hololive/hololive-alarm-worker/Dockerfile
      args:
        VERSION: ${HOLO_ALARM_WORKER_VERSION:-${HOLO_BOT_VERSION:-2.0.0}}
    container_name: hololive-alarm-worker
    environment:
      <<: [*app-file-log-env, *cache-env, *postgres-env]
      NOTIFICATION_SCHEDULER_ROLE: "worker"
      SERVER_PORT: 30007
      ALARM_DISPATCH_PUBLISH_MODE: ${ALARM_DISPATCH_PUBLISH_MODE:-valkey_only}
      ALARM_DISPATCH_CONSUMER_MODE: ${ALARM_DISPATCH_CONSUMER_MODE:-valkey}
      ALARM_DISPATCH_SHADOW_FATAL: ${ALARM_DISPATCH_SHADOW_FATAL:-false}
      ALARM_DISPATCH_WAKEUP_ENABLED: ${ALARM_DISPATCH_WAKEUP_ENABLED:-true}
      ALARM_DISPATCH_MAX_DELIVERIES_PER_BATCH: ${ALARM_DISPATCH_MAX_DELIVERIES_PER_BATCH:-1000}
      LOG_DIR: /app/logs
      GOMEMLIMIT: "320MiB"
      APP_ENV: "production"
    ports:
      - "127.0.0.1:30007:30007"
    volumes: *go-basic-volumes
    extra_hosts: *host-extra-hosts
    depends_on: *db-cache-depends
    deploy: *deploy-384m
    healthcheck:
      <<: *go-healthcheck
      test: ["CMD", "./bin/healthcheck", "http://127.0.0.1:30007/health"]
    networks:
      hololive-net:
        aliases:
          - hololive-alarm-worker

  # dispatcher-go: alarm:dispatch:queue 소비 + Iris 발송
  dispatcher-go:
    <<: *app-service
    image: hololive-dispatcher-go:prod
    build:
      <<: *go-build-base
      dockerfile: hololive/hololive-dispatcher-go/Dockerfile
      args:
        VERSION: ${HOLO_BOT_VERSION:-2.0.0}
    container_name: hololive-dispatcher-go
    environment:
      <<: [*app-file-log-env, *cache-env, *postgres-env]
      DISPATCHER_PORT: "30020"
      IRIS_BASE_URL: ${IRIS_BASE_URL:-}
      IRIS_BASE_URL_FILE: ${IRIS_BASE_URL_FILE:-/app/runtime-config/iris_base_url}
      IRIS_TRANSPORT: ${IRIS_TRANSPORT:-h3}
      IRIS_H3_CA_CERT_FILE: ${IRIS_H3_CA_CERT_FILE:-/run/hololive-bot/certs/iris-ca.pem}
      IRIS_H3_SERVER_NAME: ${IRIS_H3_SERVER_NAME:-}
      IRIS_BOT_TOKEN: ${IRIS_BOT_TOKEN:?IRIS_BOT_TOKEN is required}
      ALARM_DISPATCH_QUEUE_KEY: alarm:dispatch:queue
      ALARM_DISPATCH_PUBLISH_MODE: ${ALARM_DISPATCH_PUBLISH_MODE:-valkey_only}
      ALARM_DISPATCH_CONSUMER_MODE: ${ALARM_DISPATCH_CONSUMER_MODE:-valkey}
      ALARM_DISPATCH_LEASE_SECONDS: ${ALARM_DISPATCH_LEASE_SECONDS:-60}
      ALARM_DISPATCH_WAKEUP_ENABLED: ${ALARM_DISPATCH_WAKEUP_ENABLED:-true}
      ALARM_DISPATCH_MAX_BATCHES_PER_WAKE: ${ALARM_DISPATCH_MAX_BATCHES_PER_WAKE:-20}
      ALARM_DISPATCH_MAX_BATCH: "50"
      DISPATCHER_RECONNECT_BACKOFF_MS: "1000"
      LOG_DIR: /app/logs
      TZ: Asia/Seoul
    dns: *public-dns
    ports:
      - "127.0.0.1:30020:30020"
    volumes: *logs-runtime-cache-volumes
    extra_hosts: *iris-extra-hosts
    depends_on:
      <<: *db-cache-depends
      hololive-bot:
        condition: service_healthy
    deploy: *deploy-256m
    healthcheck:
      <<: *go-healthcheck
      test: ["CMD", "./bin/healthcheck", "http://127.0.0.1:30020/ready"]
    networks:
      hololive-net:
        aliases:
          - dispatcher-go

  stream-ingester:
    <<: *app-service
    profiles: ["oracle"]
    image: hololive-stream-ingester:prod
    build:
      <<: *go-build-base
      dockerfile: hololive/hololive-stream-ingester/Dockerfile
      args:
        VERSION: ${HOLO_BOT_VERSION:-2.0.0}
    container_name: hololive-stream-ingester
    environment:
      <<: [*app-file-log-env, *iris-env, *cache-env, *postgres-env, *scraper-env, *majorevent-env, *cliproxy-env]
      SERVER_PORT: 30004
      YOUTUBE_INGESTION_ENABLED: "false"
      PHOTO_SYNC_ENABLED: "true"
      YOUTUBE_COMMUNITY_SHORTS_BIGBANG_ENABLED: "false"
      GOGC: "100"
      GOMEMLIMIT: "320MiB"
      GIN_MODE: release
      LOG_DIR: /app/logs
    dns: *public-dns
    ports:
      - "127.0.0.1:30004:30004"
    volumes: *go-volumes
    extra_hosts: *iris-extra-hosts
    depends_on: *db-cache-depends
    deploy: *deploy-384m
    healthcheck:
      <<: *go-healthcheck
      test: ["CMD", "./bin/healthcheck", "http://127.0.0.1:30004/health"]
    networks:
      hololive-net:
        aliases:
          - stream-ingester

  youtube-scraper:
    <<: *app-service
    profiles: ["oracle"]
    image: hololive-youtube-scraper:prod
    build:
      <<: *go-build-base
      dockerfile: hololive/hololive-stream-ingester/Dockerfile.youtube-scraper
      args:
        VERSION: ${HOLO_BOT_VERSION:-2.0.0}
    container_name: hololive-youtube-scraper
    environment:
      <<: [*app-file-log-env, *iris-env, *cache-env, *postgres-env, *scraper-env, *majorevent-env, *cliproxy-env]
      SERVER_PORT: 30005
      YOUTUBE_INGESTION_ENABLED: "true"
      PHOTO_SYNC_ENABLED: "false"
      YOUTUBE_COMMUNITY_SHORTS_BIGBANG_ENABLED: "true"
      GOGC: "100"
      GOMEMLIMIT: "320MiB"
      GIN_MODE: release
      LOG_DIR: /app/logs
    dns: *public-dns
    ports:
      - "127.0.0.1:30005:30005"
    volumes: *go-volumes
    extra_hosts: *iris-extra-hosts
    depends_on: *db-cache-depends
    deploy: *deploy-384m
    healthcheck:
      <<: *go-healthcheck
      test: ["CMD", "./bin/healthcheck", "http://127.0.0.1:30005/health"]
    networks:
      hololive-net:
        aliases:
          - youtube-scraper

  llm-scheduler:
    <<: *app-service
    image: hololive-llm-scheduler:prod
    build:
      <<: *go-build-base
      dockerfile: hololive/hololive-llm-sched/Dockerfile
      args:
        VERSION: ${HOLO_BOT_VERSION:-2.0.0}
    container_name: hololive-llm-scheduler
    environment:
      <<: [*app-file-log-env, *iris-env, *cache-env, *postgres-env, *majorevent-env, *cliproxy-env]
      LLM_SCHEDULER_PORT: 30003
      GOGC: "100"
      # Dockerfile 기본값은 GOMEMLIMIT=192MiB이지만 운영 deploy limit에 맞춰 256MiB로 올립니다.
      GOMEMLIMIT: "256MiB"
      GIN_MODE: release
      LOG_DIR: /app/logs
    dns: *public-dns
    ports:
      - "127.0.0.1:30003:30003"
    volumes: *go-volumes
    extra_hosts: *iris-extra-hosts
    depends_on: *db-cache-depends
    deploy: *deploy-320m
    healthcheck:
      <<: *go-healthcheck
      test: ["CMD", "./bin/healthcheck", "http://127.0.0.1:30003/health"]
    networks:
      hololive-net:
        aliases:
          - llm-scheduler

  # Admin Dashboard (Unified Management Hub)
  admin-dashboard:
    <<: *app-service
    image: admin-dashboard:prod
    build:
      context: .
      dockerfile: admin-dashboard/Dockerfile
    container_name: admin-dashboard
    environment:
      PORT: "30190"
      ENV: "production"
      FORCE_HTTPS: "true"
      LOG_LEVEL: "info"
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASS_HASH: ${ADMIN_PASS_BCRYPT:?set ADMIN_PASS_BCRYPT in .env}
      SESSION_SECRET: ${SESSION_SECRET:?set SESSION_SECRET in .env}
      SESSION_TOKEN_ROTATION: "true"
      VALKEY_URL: :${CACHE_PASSWORD:?set CACHE_PASSWORD in .env}@valkey-cache:6379
      DOCKER_HOST: tcp://docker-proxy:2375
      HOLO_ADMIN_API_URL: http://hololive-admin-api:30006
      HOLO_BOT_URL: http://hololive-admin-api:30006
      HOLO_BOT_API_KEY: ${HOLO_BOT_API_KEY:-}
      LOG_DIR: /app/logs
    ports:
      - "127.0.0.1:30190:30190"
    volumes:
      - ./logs:/app/logs
    extra_hosts: *host-extra-hosts
    depends_on:
      valkey-cache:
        condition: service_healthy
      hololive-admin-api:
        condition: service_healthy
      docker-proxy:
        condition: service_started
    deploy: *deploy-128m
    healthcheck:
      <<: *go-healthcheck
      test: ["CMD", "./bin/healthcheck", "http://127.0.0.1:30190/health"]
    networks:
      hololive-net:
        aliases:
          - admin-dashboard
      docker-proxy-net: {}

  # Docker Socket Proxy
  docker-proxy:
    <<: *restart-logging
    image: ${DOCKER_SOCKET_PROXY_IMAGE:-tecnativa/docker-socket-proxy@sha256:1f3a6f303320723d199d2316a3e82b2e2685d86c275d5e3deeaf182573b47476}
    container_name: docker-proxy
    environment:
      #(1=허용, 0=차단)
      CONTAINERS: 1
      POST: 1
      LOGS: 1
      BUILD: 0
      EXEC: 0
      IMAGES: 0
      NETWORKS: 0
      VOLUMES: 0
      SWARM: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    tmpfs:
      - /run:size=16m,mode=1777
      - /tmp:size=16m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy: *deploy-32m
    networks:
      - docker-proxy-net

  # Container Health Monitor (DeUnhealth)
  deunhealth:
    <<: [*restart-logging, *security-hardening]
    image: ${DEUNHEALTH_IMAGE:-qmcgaw/deunhealth@sha256:db1e4fcd3aceeb0da34a83f7a8a5432df586e6d0388ddb6ad8dd7b479e4aa25d}
    container_name: deunhealth
    environment:
      TZ: Asia/Seoul
      LOG_LEVEL: info
      DOCKER_HOST: tcp://docker-proxy:2375
    depends_on:
      docker-proxy:
        condition: service_started
    deploy: *deploy-32m
    networks:
      - docker-proxy-net

volumes:
  holo-pg-data:
  valkey-cache-data:
  valkey-cache-socket:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=1m,mode=0777

networks:
  hololive-net:
    driver: bridge
  docker-proxy-net:
    driver: bridge
    internal: true
