name: hololive-bot

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-app-file-log-env: &app-file-log-env
  LOG_LEVEL: ${LOG_LEVEL:-info}
  LOG_MAX_SIZE_MB: ${LOG_MAX_SIZE_MB:-100}
  LOG_MAX_BACKUPS: ${LOG_MAX_BACKUPS:-5}
  LOG_MAX_AGE_DAYS: ${LOG_MAX_AGE_DAYS:-30}
  LOG_COMPRESS: ${LOG_COMPRESS:-true}

x-security-hardening: &security-hardening
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  read_only: true
  tmpfs:
    - /tmp:size=64m,mode=1777

# DB/Cache용 보안 설정 (setuid/setgid 필요)
x-db-security: &db-security
  cap_drop:
    - ALL
  cap_add:
    - SETUID
    - SETGID
    - CHOWN
    - FOWNER
    - DAC_OVERRIDE
  read_only: true
  tmpfs:
    - /tmp:size=64m,mode=1777

services:
  # Storage & Infrastructure
  holo-postgres:
    image: ${POSTGRES_IMAGE:-postgres:18}
    container_name: holo-postgres
    restart: always
    labels:
      deunhealth.restart.on.unhealthy: "true"
    shm_size: 256mb
    environment:
      POSTGRES_DB: hololive
      POSTGRES_USER: ${POSTGRES_ADMIN_USER:-postgres_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
      POSTGRES_ADMIN_USER: ${POSTGRES_ADMIN_USER:-postgres_admin}
      POSTGRES_ADMIN_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
      HOLOLIVE_DB_USER: ${HOLOLIVE_DB_USER:-hololive_runtime}
      HOLOLIVE_MIGRATOR_USER: ${HOLOLIVE_MIGRATOR_USER:-hololive_migrator}
      HOLOLIVE_SCRAPER_USER: ${HOLOLIVE_SCRAPER_USER:-hololive_scraper}
      HOLOLIVE_SCRAPER_PASSWORD: ${HOLOLIVE_SCRAPER_PASSWORD:-}
      PGDATA: /var/lib/postgresql/data/pgdata
      PGPORT: "5433"
    volumes:
      - holo-pg-data:/var/lib/postgresql/data
      - ./backups:/backups
      - ./hololive/hololive-kakao-bot-go/scripts/init-db:/docker-entrypoint-initdb.d:ro
    tmpfs:
      - /tmp:size=64m,mode=1777
      - /var/run/postgresql:size=16m,mode=3775
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB -p 5433 && psql -U $$POSTGRES_USER -d $$POSTGRES_DB -p 5433 -c 'SELECT 1' -q -t" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512m
    network_mode: host
    logging: *default-logging
    <<: *db-security

  valkey-cache:
    image: valkey/valkey:9.0.2-alpine3.23
    container_name: valkey-cache
    labels:
      deunhealth.restart.on.unhealthy: "true"
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - valkey-cache-data:/data
      - valkey-cache-socket:/var/run/valkey
    command: >
      valkey-server --unixsocket /var/run/valkey/valkey-cache.sock --unixsocketperm 777 --port 6379 --appendonly no --save "" --maxmemory 384mb --maxmemory-policy allkeys-lfu --loglevel notice --io-threads 4 --io-threads-do-reads yes --activedefrag yes --active-defrag-threshold-lower 10 --active-defrag-cycle-min 1 --active-defrag-cycle-max 25
    sysctls:
      - net.core.somaxconn=1024
    restart: always
    healthcheck:
      test: [ "CMD", "valkey-cli", "-s", "/var/run/valkey/valkey-cache.sock", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m
    logging: *default-logging
    <<: *db-security
    networks:
      - hololive-net

  hololive-db-migrate:
    image: ${POSTGRES_IMAGE:-postgres:18}
    container_name: hololive-db-migrate
    restart: "no"
    environment:
      PGHOST: host.docker.internal
      PGPORT: "5433"
      PGDATABASE: hololive
      PGUSER: ${HOLOLIVE_MIGRATOR_USER:-hololive_migrator}
      PGPASSWORD: ${DB_PASSWORD}
      POSTGRES_ADMIN_USER: ${POSTGRES_ADMIN_USER:-postgres_admin}
      POSTGRES_ADMIN_PASSWORD: ${DB_PASSWORD}
      HOLOLIVE_SCRAPER_USER: ${HOLOLIVE_SCRAPER_USER:-hololive_scraper}
      HOLOLIVE_SCRAPER_PASSWORD: ${HOLOLIVE_SCRAPER_PASSWORD:-}
    command:
      - /bin/sh
      - /migrations/bootstrap-and-apply.sh
    volumes:
      - ./hololive/hololive-kakao-bot-go/scripts/migrations:/migrations:ro
    depends_on:
      holo-postgres:
        condition: service_healthy
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - hololive-net

  # Core Services
  hololive-bot:
    image: hololive-kakao-bot-go:prod
    build:
      context: .
      dockerfile: hololive/hololive-kakao-bot-go/Dockerfile
      additional_contexts:
        shared_go_workspace: ${SHARED_GO_WORKSPACE_PATH:-./shared-go}
      args:
        VERSION: ${HOLO_BOT_VERSION:-2.0.0}
    container_name: hololive-kakao-bot-go
    restart: always
    labels:
      deunhealth.restart.on.unhealthy: "true"
    env_file:
      - ./.env
    environment:
      <<: *app-file-log-env
      GOGC: "60"
      IRIS_BASE_URL: ${IRIS_BASE_URL:?IRIS_BASE_URL is required}
      IRIS_WEBHOOK_TOKEN: ${IRIS_WEBHOOK_TOKEN:?IRIS_WEBHOOK_TOKEN is required}
      IRIS_BOT_TOKEN: ${IRIS_BOT_TOKEN:?IRIS_BOT_TOKEN is required}
      CACHE_SOCKET_PATH: /var/run/valkey/valkey-cache.sock
      CACHE_HOST: valkey-cache
      CACHE_PORT: 6379
      POSTGRES_HOST: host.docker.internal
      POSTGRES_PORT: "5433"
      POSTGRES_SOCKET_PATH: ""
      POSTGRES_DB: hololive
      POSTGRES_USER: ${HOLOLIVE_DB_USER:-hololive_runtime}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_SSLMODE: ${POSTGRES_SSLMODE:-require}
      POSTGRES_QUERY_EXEC_MODE: ${POSTGRES_QUERY_EXEC_MODE:-exec}
      POSTGRES_AUTO_PREPARE_SCHEMA: "false"
      MAJOREVENT_SCRAPER_ENABLED: "${MAJOREVENT_SCRAPER_ENABLED:-false}"
      MAJOREVENT_SCRAPE_HOUR_KST: "4"
      LLM_SCHEDULER_INTERNAL_URL: http://llm-scheduler:30003
      BOT_ADMIN_ENABLED: "true"
      SERVER_PORT: 30001
      LOG_DIR: /app/logs
      GOMEMLIMIT: "450MiB"
      # 통합 Goroutine 모니터링용 외부 서비스 Health URL (llm 레포 서비스 → host.docker.internal)
      SERVICES_LLM_SCHEDULER_HEALTH_URL: http://host.docker.internal:30003/health
      SERVICES_GAME_BOT_TWENTYQ_HEALTH_URL: http://host.docker.internal:30081/health
      SERVICES_GAME_BOT_TURTLE_HEALTH_URL: http://host.docker.internal:30082/health
      APP_ENV: "production"
      # Docker Socket Proxy (보안: 직접 소켓 마운트 대신 제한된 API만 허용)
      DOCKER_HOST: tcp://docker-proxy:2375
      # CLIProxy LLM (행사 요약 + 멤버뉴스)
      CLIPROXY_ENABLED: "true"
      CLIPROXY_BASE_URL: ${CLIPROXY_BASE_URL:-http://host.docker.internal:8787/v1}
      CLIPROXY_API_KEY: ${CLIPROXY_API_KEY:-}
      CLIPROXY_MODEL: ${CLIPROXY_MODEL:-gpt-5.4}
      CLIPROXY_REASONING_EFFORT: ${CLIPROXY_REASONING_EFFORT:-high}
    ports:
      - "127.0.0.1:30001:30001"
      - "100.100.1.3:30001:30001"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - valkey-cache-socket:/var/run/valkey:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      holo-postgres:
        condition: service_healthy
      hololive-db-migrate:
        condition: service_completed_successfully
      valkey-cache:
        condition: service_healthy
      docker-proxy:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 512m
    healthcheck:
      test: [ "CMD-SHELL", "wget -q --spider -T 5 http://localhost:30001/health || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3
    logging: *default-logging
    <<: *security-hardening
    networks:
      hololive-net:
        aliases:
          - hololive-bot

  # dispatcher-go: alarm:dispatch:queue 소비 + Iris 발송
  dispatcher-go:
    image: hololive-dispatcher-go:prod
    build:
      context: .
      dockerfile: hololive/hololive-dispatcher-go/Dockerfile
      additional_contexts:
        shared_go_workspace: ${SHARED_GO_WORKSPACE_PATH:-./shared-go}
      args:
        VERSION: ${HOLO_BOT_VERSION:-2.0.0}
    container_name: hololive-dispatcher-go
    restart: always
    labels:
      deunhealth.restart.on.unhealthy: "true"
    env_file:
      - ./.env
    environment:
      <<: *app-file-log-env
      DISPATCHER_PORT: "30020"
      IRIS_BASE_URL: ${IRIS_BASE_URL:?IRIS_BASE_URL is required}
      IRIS_BOT_TOKEN: ${IRIS_BOT_TOKEN:?IRIS_BOT_TOKEN is required}
      CACHE_HOST: valkey-cache
      CACHE_PORT: 6379
      CACHE_SOCKET_PATH: /var/run/valkey/valkey-cache.sock
      ALARM_DISPATCH_QUEUE_KEY: alarm:dispatch:queue
      ALARM_DISPATCH_MAX_BATCH: "50"
      DISPATCHER_RECONNECT_BACKOFF_MS: "1000"
      LOG_DIR: /app/logs
      TZ: Asia/Seoul
    ports:
      - "127.0.0.1:30020:30020"
    volumes:
      - ./logs:/app/logs
      - valkey-cache-socket:/var/run/valkey:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      valkey-cache:
        condition: service_healthy
      hololive-bot:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256m
    healthcheck:
      test: [ "CMD-SHELL", "wget -q --spider -T 5 http://localhost:30020/ready || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3
    logging: *default-logging
    <<: *security-hardening
    networks:
      hololive-net:
        aliases:
          - dispatcher-go

  stream-ingester:
    image: hololive-stream-ingester:prod
    build:
      context: .
      dockerfile: hololive/hololive-stream-ingester/Dockerfile
      additional_contexts:
        shared_go_workspace: ${SHARED_GO_WORKSPACE_PATH:-./shared-go}
      args:
        VERSION: ${HOLO_BOT_VERSION:-2.0.0}
    container_name: hololive-stream-ingester
    restart: always
    labels:
      deunhealth.restart.on.unhealthy: "true"
    env_file:
      - ./.env
    environment:
      <<: *app-file-log-env
      SERVER_PORT: 30004
      YOUTUBE_INGESTION_ENABLED: "false"
      PHOTO_SYNC_ENABLED: "true"
      YOUTUBE_COMMUNITY_SHORTS_BIGBANG_ENABLED: "false"
      IRIS_BASE_URL: ${IRIS_BASE_URL:?IRIS_BASE_URL is required}
      IRIS_WEBHOOK_TOKEN: ${IRIS_WEBHOOK_TOKEN:?IRIS_WEBHOOK_TOKEN is required}
      IRIS_BOT_TOKEN: ${IRIS_BOT_TOKEN:?IRIS_BOT_TOKEN is required}
      CACHE_SOCKET_PATH: /var/run/valkey/valkey-cache.sock
      CACHE_HOST: valkey-cache
      CACHE_PORT: 6379
      POSTGRES_HOST: host.docker.internal
      POSTGRES_PORT: "5433"
      POSTGRES_SOCKET_PATH: ""
      POSTGRES_DB: hololive
      POSTGRES_USER: ${HOLOLIVE_DB_USER:-hololive_runtime}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_SSLMODE: ${POSTGRES_SSLMODE:-require}
      POSTGRES_QUERY_EXEC_MODE: ${POSTGRES_QUERY_EXEC_MODE:-exec}
      POSTGRES_AUTO_PREPARE_SCHEMA: "false"
      SCRAPER_SCHEDULER_WORKER_COUNT: "${SCRAPER_SCHEDULER_WORKER_COUNT:-4}"
      SCRAPER_POLL_VIDEOS_INTERVAL_SECONDS: "${SCRAPER_POLL_VIDEOS_INTERVAL_SECONDS:-900}"
      SCRAPER_POLL_SHORTS_INTERVAL_SECONDS: "${SCRAPER_POLL_SHORTS_INTERVAL_SECONDS:-1800}"
      SCRAPER_POLL_COMMUNITY_INTERVAL_SECONDS: "${SCRAPER_POLL_COMMUNITY_INTERVAL_SECONDS:-1800}"
      SCRAPER_POLL_STATS_INTERVAL_SECONDS: "${SCRAPER_POLL_STATS_INTERVAL_SECONDS:-21600}"
      SCRAPER_POLL_LIVE_INTERVAL_SECONDS: "${SCRAPER_POLL_LIVE_INTERVAL_SECONDS:-600}"
      MAJOREVENT_SCRAPER_ENABLED: "${MAJOREVENT_SCRAPER_ENABLED:-false}"
      MAJOREVENT_SCRAPE_HOUR_KST: "4"
      GOGC: "100"
      GOMEMLIMIT: "320MiB"
      GIN_MODE: release
      CLIPROXY_ENABLED: "true"
      CLIPROXY_BASE_URL: ${CLIPROXY_BASE_URL:-http://host.docker.internal:8787/v1}
      CLIPROXY_API_KEY: ${CLIPROXY_API_KEY:-}
      CLIPROXY_MODEL: ${CLIPROXY_MODEL:-gpt-5.4}
      CLIPROXY_REASONING_EFFORT: ${CLIPROXY_REASONING_EFFORT:-high}
      LOG_DIR: /app/logs
    ports:
      - "127.0.0.1:30004:30004"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - valkey-cache-socket:/var/run/valkey:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      holo-postgres:
        condition: service_healthy
      hololive-db-migrate:
        condition: service_completed_successfully
      valkey-cache:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 384m
    healthcheck:
      test: [ "CMD-SHELL", "wget -q --spider -T 5 http://localhost:30004/health || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3
    logging: *default-logging
    <<: *security-hardening
    networks:
      hololive-net:
        aliases:
          - stream-ingester

  youtube-scraper:
    image: hololive-youtube-scraper:prod
    build:
      context: .
      dockerfile: hololive/hololive-stream-ingester/Dockerfile.youtube-scraper
      additional_contexts:
        shared_go_workspace: ${SHARED_GO_WORKSPACE_PATH:-./shared-go}
      args:
        VERSION: ${HOLO_BOT_VERSION:-2.0.0}
    container_name: hololive-youtube-scraper
    restart: always
    labels:
      deunhealth.restart.on.unhealthy: "true"
    env_file:
      - ./.env
    environment:
      <<: *app-file-log-env
      SERVER_PORT: 30005
      YOUTUBE_INGESTION_ENABLED: "true"
      PHOTO_SYNC_ENABLED: "false"
      YOUTUBE_COMMUNITY_SHORTS_BIGBANG_ENABLED: "true"
      IRIS_BASE_URL: ${IRIS_BASE_URL:?IRIS_BASE_URL is required}
      IRIS_WEBHOOK_TOKEN: ${IRIS_WEBHOOK_TOKEN:?IRIS_WEBHOOK_TOKEN is required}
      IRIS_BOT_TOKEN: ${IRIS_BOT_TOKEN:?IRIS_BOT_TOKEN is required}
      CACHE_SOCKET_PATH: /var/run/valkey/valkey-cache.sock
      CACHE_HOST: valkey-cache
      CACHE_PORT: 6379
      POSTGRES_HOST: host.docker.internal
      POSTGRES_PORT: "5433"
      POSTGRES_SOCKET_PATH: ""
      POSTGRES_DB: hololive
      POSTGRES_USER: ${HOLOLIVE_DB_USER:-hololive_runtime}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_SSLMODE: ${POSTGRES_SSLMODE:-require}
      POSTGRES_QUERY_EXEC_MODE: ${POSTGRES_QUERY_EXEC_MODE:-exec}
      POSTGRES_AUTO_PREPARE_SCHEMA: "false"
      SCRAPER_SCHEDULER_WORKER_COUNT: "${SCRAPER_SCHEDULER_WORKER_COUNT:-4}"
      SCRAPER_POLL_VIDEOS_INTERVAL_SECONDS: "${SCRAPER_POLL_VIDEOS_INTERVAL_SECONDS:-900}"
      SCRAPER_POLL_SHORTS_INTERVAL_SECONDS: "${SCRAPER_POLL_SHORTS_INTERVAL_SECONDS:-1800}"
      SCRAPER_POLL_COMMUNITY_INTERVAL_SECONDS: "${SCRAPER_POLL_COMMUNITY_INTERVAL_SECONDS:-1800}"
      SCRAPER_POLL_STATS_INTERVAL_SECONDS: "${SCRAPER_POLL_STATS_INTERVAL_SECONDS:-21600}"
      SCRAPER_POLL_LIVE_INTERVAL_SECONDS: "${SCRAPER_POLL_LIVE_INTERVAL_SECONDS:-600}"
      MAJOREVENT_SCRAPER_ENABLED: "${MAJOREVENT_SCRAPER_ENABLED:-false}"
      MAJOREVENT_SCRAPE_HOUR_KST: "4"
      GOGC: "100"
      GOMEMLIMIT: "320MiB"
      GIN_MODE: release
      CLIPROXY_ENABLED: "true"
      CLIPROXY_BASE_URL: ${CLIPROXY_BASE_URL:-http://host.docker.internal:8787/v1}
      CLIPROXY_API_KEY: ${CLIPROXY_API_KEY:-}
      CLIPROXY_MODEL: ${CLIPROXY_MODEL:-gpt-5.4}
      CLIPROXY_REASONING_EFFORT: ${CLIPROXY_REASONING_EFFORT:-high}
      LOG_DIR: /app/logs
    ports:
      - "127.0.0.1:30005:30005"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - valkey-cache-socket:/var/run/valkey:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      holo-postgres:
        condition: service_healthy
      hololive-db-migrate:
        condition: service_completed_successfully
      valkey-cache:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 384m
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:30005/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging: *default-logging
    <<: *security-hardening
    networks:
      hololive-net:
        aliases:
          - youtube-scraper

  llm-scheduler:
    image: hololive-llm-scheduler:prod
    build:
      context: .
      dockerfile: hololive/hololive-llm-sched/Dockerfile
      additional_contexts:
        shared_go_workspace: ${SHARED_GO_WORKSPACE_PATH:-./shared-go}
      args:
        VERSION: ${HOLO_BOT_VERSION:-2.0.0}
    container_name: hololive-llm-scheduler
    restart: always
    labels:
      deunhealth.restart.on.unhealthy: "true"
    env_file:
      - ./.env
    environment:
      <<: *app-file-log-env
      LLM_SCHEDULER_PORT: 30003
      IRIS_BASE_URL: ${IRIS_BASE_URL:?IRIS_BASE_URL is required}
      IRIS_WEBHOOK_TOKEN: ${IRIS_WEBHOOK_TOKEN:?IRIS_WEBHOOK_TOKEN is required}
      IRIS_BOT_TOKEN: ${IRIS_BOT_TOKEN:?IRIS_BOT_TOKEN is required}
      CACHE_SOCKET_PATH: /var/run/valkey/valkey-cache.sock
      CACHE_HOST: valkey-cache
      CACHE_PORT: 6379
      POSTGRES_HOST: host.docker.internal
      POSTGRES_PORT: "5433"
      POSTGRES_SOCKET_PATH: ""
      POSTGRES_DB: hololive
      POSTGRES_USER: ${HOLOLIVE_DB_USER:-hololive_runtime}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_SSLMODE: ${POSTGRES_SSLMODE:-require}
      POSTGRES_QUERY_EXEC_MODE: ${POSTGRES_QUERY_EXEC_MODE:-exec}
      POSTGRES_AUTO_PREPARE_SCHEMA: "false"
      MAJOREVENT_SCRAPER_ENABLED: "${MAJOREVENT_SCRAPER_ENABLED:-false}"
      MAJOREVENT_SCRAPE_HOUR_KST: "4"
      GOGC: "100"
      GOMEMLIMIT: "256MiB"
      GIN_MODE: release
      CLIPROXY_ENABLED: "true"
      CLIPROXY_BASE_URL: ${CLIPROXY_BASE_URL:-http://host.docker.internal:8787/v1}
      CLIPROXY_API_KEY: ${CLIPROXY_API_KEY:-}
      CLIPROXY_MODEL: ${CLIPROXY_MODEL:-gpt-5.4}
      CLIPROXY_REASONING_EFFORT: ${CLIPROXY_REASONING_EFFORT:-high}
      LOG_DIR: /app/logs
    ports:
      - "127.0.0.1:30003:30003"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - valkey-cache-socket:/var/run/valkey:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      holo-postgres:
        condition: service_healthy
      hololive-db-migrate:
        condition: service_completed_successfully
      valkey-cache:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 320m
    healthcheck:
      test: [ "CMD-SHELL", "wget -q --spider -T 5 http://localhost:30003/health || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3
    logging: *default-logging
    <<: *security-hardening
    networks:
      hololive-net:
        aliases:
          - llm-scheduler

  # Admin Dashboard (Unified Management Hub)
  admin-dashboard:
    image: admin-dashboard:prod
    build:
      context: .
      dockerfile: admin-dashboard/Dockerfile
    container_name: admin-dashboard
    restart: always
    labels:
      deunhealth.restart.on.unhealthy: "true"
    env_file:
      - ./.env
    environment:
      PORT: "30190"
      ENV: "production"
      FORCE_HTTPS: "true"
      LOG_LEVEL: "info"
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASS_HASH: ${ADMIN_PASS_BCRYPT:?set ADMIN_PASS_BCRYPT in .env}
      SESSION_SECRET: ${SESSION_SECRET:?set SESSION_SECRET in .env}
      SESSION_TOKEN_ROTATION: "true"
      VALKEY_URL: valkey-cache:6379
      DOCKER_HOST: tcp://docker-proxy:2375
      HOLO_BOT_URL: http://hololive-kakao-bot-go:30001
      HOLO_BOT_API_KEY: ${HOLO_BOT_API_KEY:-}
      LOG_DIR: /app/logs
    ports:
      - "127.0.0.1:30190:30190"
    volumes:
      - ./logs:/app/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      valkey-cache:
        condition: service_healthy
      hololive-bot:
        condition: service_healthy
      docker-proxy:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 128m
    healthcheck:
      test: [ "CMD-SHELL", "wget -q --spider -T 5 http://127.0.0.1:30190/health || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3
    logging: *default-logging
    <<: *security-hardening
    networks:
      hololive-net:
        aliases:
          - admin-dashboard

  # Docker Socket Proxy
  docker-proxy:
    image: ${DOCKER_SOCKET_PROXY_IMAGE:-tecnativa/docker-socket-proxy:latest}
    container_name: docker-proxy
    restart: always
    environment:
      #(1=허용, 0=차단)
      CONTAINERS: 1
      POST: 1
      LOGS: 1
      BUILD: 0
      EXEC: 0
      IMAGES: 0
      NETWORKS: 0
      VOLUMES: 0
      SWARM: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    tmpfs:
      - /run:size=16m,mode=1777
      - /tmp:size=16m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 32m
    logging: *default-logging
    networks:
      - hololive-net

  # Container Health Monitor (DeUnhealth)
  deunhealth:
    image: ${DEUNHEALTH_IMAGE:-qmcgaw/deunhealth:latest}
    container_name: deunhealth
    restart: always
    environment:
      TZ: Asia/Seoul
      LOG_LEVEL: info
      DOCKER_HOST: tcp://docker-proxy:2375
    depends_on:
      docker-proxy:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 32m
    logging: *default-logging
    <<: *security-hardening
    networks:
      - hololive-net

volumes:
  holo-pg-data:
  valkey-cache-data:
  valkey-cache-socket:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=1m,mode=0777

networks:
  hololive-net:
    driver: bridge
