version: "2"

run:
  timeout: 10m
  tests: true
  modules-download-mode: readonly
  relative-path-mode: gomod

linters:
  default: none
  enable:
    # existing baseline
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused

    # stage 1: production bug catchers
    - bodyclose
    - noctx
    - errorlint
    - durationcheck
    - copyloopvar

    # stage 2: nil/security/context/coverage-adjacent checks
    - gosec
    - exhaustive
    - contextcheck
    - unconvert
    - unparam
    - gocritic

    # stage 3: stricter correctness and maintainability checks
    - errchkjson
    - makezero
    - prealloc
    - nestif
    - gocognit
    - nolintlint

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true

    staticcheck:
      checks:
        - all
        - -ST1000
        - -ST1020
        - -ST1021
        - -ST1022
        - -ST1003
        - -ST1016
        - -QF1001
        - -QF1002
        - -QF1008
        - -QF1012

    gocognit:
      min-complexity: 20

    nestif:
      min-complexity: 5

    gocritic:
      enabled-tags:
        - diagnostic
        - performance
        - style

  exclusions:
    generated: strict
    warn-unused: true
    paths:
      - '.*\.pb\.go$'
      - vendor
      - proto
      - admin-dashboard/frontend/node_modules

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  uniq-by-line: true
  new: false
